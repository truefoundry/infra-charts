## =============================================================================
## @section Headlamp configuration
## Headlamp is deployed as a subchart. RBAC is managed by this chart.
## =============================================================================
headlamp:
  ## @param headlamp.enabled Deploy Headlamp
  enabled: false
  ## @param headlamp.clusterRoleBinding.create Keep false - prevents headlamp subchart from creating a cluster-admin ClusterRoleBinding. Read-only RBAC is always created by this chart when headlamp.enabled=true.
  clusterRoleBinding:
    create: false
  ## @param headlamp.allowPodExec Allow shell/exec into pods from headlamp.
  allowPodExec: false
  ## @param headlamp.podSecurityContext [object] Pod security context
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  ## @param headlamp.securityContext [object] Container security context
  securityContext:
    runAsUser: 100
    privileged: false
    runAsGroup: 101
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    allowPrivilegeEscalation: false
  config:
    ## @param headlamp.config.inCluster Use in-cluster auth mode. Must be false to enable the kubeconfig auto-auth bypass.
    inCluster: false
    ## @param headlamp.config.baseURL Base URL path at which Headlamp is served. Must match the proxy path prefix.
    baseURL: "/admin/kubernetes"
    ## @param headlamp.config.pluginsDir Directory for Headlamp plugins
    pluginsDir: "/headlamp/plugins"
    ## @skip headlamp.config.extraArgs
    extraArgs:
      - "-kubeconfig=/etc/headlamp/kubeconfig"
  persistentVolumeClaim:
    ## @param headlamp.persistentVolumeClaim.enabled Enable PVC for plugin storage
    enabled: false
  ## @param headlamp.service.port Service port for Headlamp
  service:
    port: 4466
  ## Mount a pre-configured kubeconfig so Headlamp auto-authenticates using the pod's SA token without showing a login screen.
  ## @skip headlamp.volumeMounts
  volumeMounts:
    - name: kubeconfig
      mountPath: /etc/headlamp/kubeconfig
      subPath: kubeconfig
      readOnly: true
  ## @skip headlamp.volumes
  volumes:
    - name: kubeconfig
      configMap:
        name: headlamp-kubeconfig
