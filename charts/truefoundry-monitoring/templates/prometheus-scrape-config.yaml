{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: tfy-cp-monitoring-scrape-config
  labels:
    {{- include "truefoundry-monitoring.labels" . | nindent 4 }}
stringData:
  additional-scrape-configs.yaml: |
    scrape_configs:
      {{- if .Values.prometheus.scrapeKubeStateMetrics }}
      - job_name: kube-state-metrics
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ .Values.prometheus.kubeStateMetricsServiceRegex | quote }}
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
      {{- end }}
      {{- if .Values.prometheus.scrapeNodeExporter }}
      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ .Values.prometheus.nodeExporterServiceRegex | quote }}
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: metrics
      {{- end }}
      - job_name: kubelet
        honor_labels: true
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
      - job_name: truefoundry-control-plane-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Values.global.controlPlaneNamespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_container_init, __meta_kubernetes_pod_container_name]
            action: keep
            regex: "(false;.*)|(true;istio-proxy)"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
            action: replace
            target_label: __scheme__
            regex: (https?)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_truefoundry_com_application_id]
            target_label: label_truefoundry_com_application_id
{{- end }}
