{{- if .Values.tfyNatsUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "truefoundry-monitoring.nats-ui.fullname" . }}
  labels:
    {{- include "truefoundry-monitoring.nats-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.tfyNatsUi.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "truefoundry-monitoring.nats-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "truefoundry-monitoring.nats-ui.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "truefoundry-monitoring.nats-ui.serviceAccountName" . }}
      imagePullSecrets:
        {{- include "truefoundry-monitoring.imagePullSecrets" (list .Values.tfyNatsUi.imagePullSecrets .) | nindent 8 }}
      {{- with .Values.tfyNatsUi.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tfy-nats-ui
          {{- with .Values.tfyNatsUi.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "truefoundry-monitoring.nats-ui.image" . }}
          imagePullPolicy: {{ .Values.tfyNatsUi.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.tfyNatsUi.service.targetPort | default .Values.tfyNatsUi.service.port }}
              protocol: TCP
          env:
            {{- $envMap := .Values.tfyNatsUi.env | default dict }}
            {{- if gt (len (keys $envMap)) 0 }}
            {{- include "truefoundry-monitoring.nats-ui.env" . | trim | nindent 12 }}
            {{- else }}
            - name: NATS_URL
              value: {{ tpl (required "tfyNatsUi.natsUrl is required when enabled and env is empty" .Values.tfyNatsUi.natsUrl) . | quote }}
            - name: NATS_ACCOUNT_SEED
              valueFrom:
                secretKeyRef:
                  name: {{ required "tfyNatsUi.accountSeedSecret.name is required when enabled and env is empty" .Values.tfyNatsUi.accountSeedSecret.name }}
                  key: {{ .Values.tfyNatsUi.accountSeedSecret.key | default "NATS_CONTROLPLANE_ACCOUNT_SEED" }}
            {{- end }}
          {{- with .Values.tfyNatsUi.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tfyNatsUi.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.tfyNatsUi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tfyNatsUi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tfyNatsUi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
