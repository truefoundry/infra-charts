{{- if and .Values.karpenter.gpuNodePool.enabled (eq (include "tfyKarpenterConfig.shouldRenderNodePool" (dict "context" . "name" .Values.karpenter.gpuNodePool.name)) "true") }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .Values.karpenter.gpuNodePool.name }}
spec:
  template:
    metadata:
      labels:
        {{- if eq (include "gpuDefaultNodeTemplate.inferredAmiFamily" .) "bottlerocket" }}
        nvidia.com/gpu.deploy.container-toolkit: 'false'
        nvidia.com/gpu.deploy.dcgm: 'true'
        nvidia.com/gpu.deploy.dcgm-exporter: 'true'
        nvidia.com/gpu.deploy.device-plugin: 'false'
        nvidia.com/gpu.deploy.driver: pre-installed
        nvidia.com/gpu.deploy.gpu-feature-discovery: 'true'
        nvidia.com/gpu.deploy.node-status-exporter: 'true'
        nvidia.com/gpu.deploy.operator-validator: 'false'
        {{- else }}
        nvidia.com/gpu.deploy.operands: 'true'
        {{- end }}
        {{- if .Values.karpenter.gpuNodePool.labels }}
        {{- .Values.karpenter.gpuNodePool.labels | toYaml | nindent 8 }}
        {{- end }}
    spec:
      nodeClassRef:
        group: {{ include "tfyKarpenterConfig.nodeClassGroup" . }}
        kind: {{ include "tfyKarpenterConfig.nodeClassKind" . }}
        name: {{ .Values.karpenter.gpuDefaultNodeTemplate.name }}
      requirements:
        {{- if .Values.karpenter.gpuNodePool.capacityTypes }}
        - key: karpenter.sh/capacity-type
          operator: In
          values:
          {{- range .Values.karpenter.gpuNodePool.capacityTypes }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.gpuNodePool.zones }}
        - key: topology.kubernetes.io/zone
          operator: In
          values:
          {{- range .Values.karpenter.gpuNodePool.zones }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.gpuNodePool.architectures }}
        - key: kubernetes.io/arch
          operator: In
          values:
          {{- range .Values.karpenter.gpuNodePool.architectures }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- $gpuAllowedInstanceValues := .Values.karpenter.gpuNodePool.instanceFamilies.allowed }}
        {{- $gpuAllowedValuesAreCategories := false }}
        {{- if and .Values.karpenter.eksAutoMode.enabled .Values.karpenter.gpuNodePool.instanceCategories.allowed }}
        {{- $gpuAllowedInstanceValues = .Values.karpenter.gpuNodePool.instanceCategories.allowed }}
        {{- $gpuAllowedValuesAreCategories = true }}
        {{- end }}
        {{- if $gpuAllowedInstanceValues }}
        - key: {{ include "tfyKarpenterConfig.instanceFamilyRequirementKey" . }}
          operator: In
          values:
          {{- include "tfyKarpenterConfig.instanceConstraintValues" (dict "values" $gpuAllowedInstanceValues "eksAutoModeEnabled" .Values.karpenter.eksAutoMode.enabled "treatAsCategory" $gpuAllowedValuesAreCategories) | nindent 10 }}
        {{- end }}
        {{- $gpuNotAllowedInstanceValues := .Values.karpenter.gpuNodePool.instanceFamilies.notAllowed }}
        {{- $gpuNotAllowedValuesAreCategories := false }}
        {{- if and .Values.karpenter.eksAutoMode.enabled .Values.karpenter.gpuNodePool.instanceCategories (hasKey .Values.karpenter.gpuNodePool.instanceCategories "notAllowed") }}
        {{- $gpuNotAllowedInstanceValues = .Values.karpenter.gpuNodePool.instanceCategories.notAllowed }}
        {{- $gpuNotAllowedValuesAreCategories = true }}
        {{- end }}
        {{- if $gpuNotAllowedInstanceValues }}
        - key: {{ include "tfyKarpenterConfig.instanceFamilyRequirementKey" . }}
          operator: NotIn
          values:
          {{- include "tfyKarpenterConfig.instanceConstraintValues" (dict "values" $gpuNotAllowedInstanceValues "eksAutoModeEnabled" .Values.karpenter.eksAutoMode.enabled "treatAsCategory" $gpuNotAllowedValuesAreCategories) | nindent 10 }}
        {{- end }}
        {{- if .Values.karpenter.gpuNodePool.instanceSizes.notAllowed }}
        - key: {{ include "tfyKarpenterConfig.instanceSizeRequirementKey" . }}
          operator: NotIn
          values:
          {{- range .Values.karpenter.gpuNodePool.instanceSizes.notAllowed }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.gpuNodePool.additionalRequirements }}
        {{- .Values.karpenter.gpuNodePool.additionalRequirements | toYaml | nindent 8 }}
        {{- end }}
      taints:
        - key: "nvidia.com/gpu"
          effect: "NoSchedule"
        {{- if .Values.karpenter.gpuNodePool.taints }}
        {{- .Values.karpenter.gpuNodePool.taints | toYaml | nindent 8 }}
        {{- end }}
  weight: {{ .Values.karpenter.gpuNodePool.weight }}
  disruption:
  {{- if .Values.karpenter.gpuNodePool.disruption }}
    {{- .Values.karpenter.gpuNodePool.disruption | toYaml | nindent 4 }}
  {{- end }}
  {{- if .Values.karpenter.gpuNodePool.limits }}
  limits:
  {{- .Values.karpenter.gpuNodePool.limits | toYaml | nindent 4 }}
  {{- end }}
{{- end }}