{{- if and .Values.karpenter.controlPlaneNodePool.enabled (eq (include "tfyKarpenterConfig.shouldRenderNodePool" (dict "context" . "name" .Values.karpenter.controlPlaneNodePool.name)) "true") }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .Values.karpenter.controlPlaneNodePool.name }}
spec:
  template:
    metadata:
      labels:
        {{- .Values.karpenter.controlPlaneNodePool.labels | toYaml | nindent 8 }}
    spec:
      nodeClassRef:
        group: {{ include "tfyKarpenterConfig.nodeClassGroup" . }}
        kind: {{ include "tfyKarpenterConfig.nodeClassKind" . }}
        name: {{ .Values.karpenter.controlPlaneNodeTemplate.name }}
      requirements:
        {{- if .Values.karpenter.controlPlaneNodePool.capacityTypes }}
        - key: karpenter.sh/capacity-type
          operator: In
          values:
          {{- range .Values.karpenter.controlPlaneNodePool.capacityTypes }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.controlPlaneNodePool.zones }}
        - key: topology.kubernetes.io/zone
          operator: In
          values:
          {{- range .Values.karpenter.controlPlaneNodePool.zones }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.controlPlaneNodePool.architectures }}
        - key: kubernetes.io/arch
          operator: In
          values:
          {{- range .Values.karpenter.controlPlaneNodePool.architectures }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        - key: kubernetes.io/os
          operator: In
          values:
          - linux
        - key: {{ include "tfyKarpenterConfig.instanceGenerationRequirementKey" . }}
          operator: Gt
          values:
            - "4"
        {{- $controlPlaneAllowedInstanceValues := .Values.karpenter.controlPlaneNodePool.instanceFamilies.allowed }}
        {{- $controlPlaneAllowedValuesAreCategories := false }}
        {{- if and .Values.karpenter.eksAutoMode.enabled .Values.karpenter.controlPlaneNodePool.instanceCategories.allowed }}
        {{- $controlPlaneAllowedInstanceValues = .Values.karpenter.controlPlaneNodePool.instanceCategories.allowed }}
        {{- $controlPlaneAllowedValuesAreCategories = true }}
        {{- end }}
        {{- if $controlPlaneAllowedInstanceValues }}
        - key: {{ include "tfyKarpenterConfig.instanceFamilyRequirementKey" . }}
          operator: In
          values:
          {{- include "tfyKarpenterConfig.instanceConstraintValues" (dict "values" $controlPlaneAllowedInstanceValues "eksAutoModeEnabled" .Values.karpenter.eksAutoMode.enabled "treatAsCategory" $controlPlaneAllowedValuesAreCategories) | nindent 10 }}
        {{- end }}
        {{- $controlPlaneNotAllowedInstanceValues := .Values.karpenter.controlPlaneNodePool.instanceFamilies.notAllowed }}
        {{- $controlPlaneNotAllowedValuesAreCategories := false }}
        {{- if and .Values.karpenter.eksAutoMode.enabled .Values.karpenter.controlPlaneNodePool.instanceCategories.notAllowed }}
        {{- $controlPlaneNotAllowedInstanceValues = .Values.karpenter.controlPlaneNodePool.instanceCategories.notAllowed }}
        {{- $controlPlaneNotAllowedValuesAreCategories = true }}
        {{- end }}
        {{- if $controlPlaneNotAllowedInstanceValues }}
        - key: {{ include "tfyKarpenterConfig.instanceFamilyRequirementKey" . }}
          operator: NotIn
          values:
          {{- include "tfyKarpenterConfig.instanceConstraintValues" (dict "values" $controlPlaneNotAllowedInstanceValues "eksAutoModeEnabled" .Values.karpenter.eksAutoMode.enabled "treatAsCategory" $controlPlaneNotAllowedValuesAreCategories) | nindent 10 }}
        {{- end }}
        {{- if .Values.karpenter.controlPlaneNodePool.instanceSizes.allowed }}
        - key: {{ include "tfyKarpenterConfig.instanceSizeRequirementKey" . }}
          operator: In
          values:
          {{- range .Values.karpenter.controlPlaneNodePool.instanceSizes.allowed  }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.controlPlaneNodePool.instanceSizes.notAllowed }}
        - key: {{ include "tfyKarpenterConfig.instanceSizeRequirementKey" . }}
          operator: NotIn
          values:
          {{- range .Values.karpenter.controlPlaneNodePool.instanceSizes.notAllowed  }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.controlPlaneNodePool.additionalRequirements }}
        {{- .Values.karpenter.controlPlaneNodePool.additionalRequirements | toYaml | nindent 8 }}
        {{- end }}
      {{- if .Values.karpenter.controlPlaneNodePool.taints }}
      taints:
        {{- toYaml .Values.karpenter.controlPlaneNodePool.taints | nindent 6 }}
      {{- end }}
  {{- if .Values.karpenter.controlPlaneNodePool.weight }}
  weight: {{ .Values.karpenter.controlPlaneNodePool.weight }}
  {{- end }}
  disruption:
  {{- if .Values.karpenter.controlPlaneNodePool.disruption }}
    {{- .Values.karpenter.controlPlaneNodePool.disruption | toYaml | nindent 4 }}
  {{- end }}
  {{- if .Values.karpenter.controlPlaneNodePool.limits }}
  limits:
  {{- .Values.karpenter.controlPlaneNodePool.limits | toYaml | nindent 4 }}
  {{- end }}
{{- end }}