{{- if and .Values.karpenter.critical.enabled (eq (include "tfyKarpenterConfig.shouldRenderNodePool" (dict "context" . "name" .Values.karpenter.critical.name)) "true") }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .Values.karpenter.critical.name }}
spec:
  template:
    metadata:
      labels:
        {{- .Values.karpenter.critical.labels | toYaml | nindent 8 }}
    spec:
      nodeClassRef:
        group: {{ include "tfyKarpenterConfig.nodeClassGroup" . }}
        kind: {{ include "tfyKarpenterConfig.nodeClassKind" . }}
        name: {{ .Values.karpenter.critical.nodeclass.name }}
      requirements:
        {{- if .Values.karpenter.critical.capacityTypes }}
        - key: karpenter.sh/capacity-type
          operator: In
          values:
          {{- range .Values.karpenter.critical.capacityTypes }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.critical.zones }}
        - key: topology.kubernetes.io/zone
          operator: In
          values:
          {{- range .Values.karpenter.critical.zones }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.critical.architectures }}
        - key: kubernetes.io/arch
          operator: In
          values:
          {{- range .Values.karpenter.critical.architectures }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        - key: kubernetes.io/os
          operator: In
          values:
          - linux
        - key: {{ include "tfyKarpenterConfig.instanceGenerationRequirementKey" . }}
          operator: Gt
          values:
            - "4"
        {{- $criticalAllowedInstanceValues := .Values.karpenter.critical.instanceFamilies.allowed }}
        {{- $criticalAllowedValuesAreCategories := false }}
        {{- if and .Values.karpenter.eksAutoMode.enabled .Values.karpenter.critical.instanceCategories.allowed }}
        {{- $criticalAllowedInstanceValues = .Values.karpenter.critical.instanceCategories.allowed }}
        {{- $criticalAllowedValuesAreCategories = true }}
        {{- end }}
        {{- if $criticalAllowedInstanceValues }}
        - key: {{ include "tfyKarpenterConfig.instanceFamilyRequirementKey" . }}
          operator: In
          values:
          {{- include "tfyKarpenterConfig.instanceConstraintValues" (dict "values" $criticalAllowedInstanceValues "eksAutoModeEnabled" .Values.karpenter.eksAutoMode.enabled "treatAsCategory" $criticalAllowedValuesAreCategories) | nindent 10 }}
        {{- end }}
        {{- $criticalNotAllowedInstanceValues := .Values.karpenter.critical.instanceFamilies.notAllowed }}
        {{- $criticalNotAllowedValuesAreCategories := false }}
        {{- if and .Values.karpenter.eksAutoMode.enabled .Values.karpenter.critical.instanceCategories (hasKey .Values.karpenter.critical.instanceCategories "notAllowed") }}
        {{- $criticalNotAllowedInstanceValues = .Values.karpenter.critical.instanceCategories.notAllowed }}
        {{- $criticalNotAllowedValuesAreCategories = true }}
        {{- end }}
        {{- if $criticalNotAllowedInstanceValues }}
        - key: {{ include "tfyKarpenterConfig.instanceFamilyRequirementKey" . }}
          operator: NotIn
          values:
          {{- include "tfyKarpenterConfig.instanceConstraintValues" (dict "values" $criticalNotAllowedInstanceValues "eksAutoModeEnabled" .Values.karpenter.eksAutoMode.enabled "treatAsCategory" $criticalNotAllowedValuesAreCategories) | nindent 10 }}
        {{- end }}
        {{- if .Values.karpenter.critical.instanceSizes.allowed }}
        - key: {{ include "tfyKarpenterConfig.instanceSizeRequirementKey" . }}
          operator: In
          values:
          {{- range .Values.karpenter.critical.instanceSizes.allowed  }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.critical.instanceSizes.notAllowed }}
        - key: {{ include "tfyKarpenterConfig.instanceSizeRequirementKey" . }}
          operator: NotIn
          values:
          {{- range .Values.karpenter.critical.instanceSizes.notAllowed  }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.karpenter.critical.additionalRequirements }}
        {{- .Values.karpenter.critical.additionalRequirements | toYaml | nindent 8 }}
        {{- end }}
      {{- if .Values.karpenter.critical.taints }}
      taints:
        {{- toYaml .Values.karpenter.critical.taints | nindent 6 }}
      {{- end }}
  {{- if .Values.karpenter.critical.weight }}
  weight: {{ .Values.karpenter.critical.weight }}
  {{- end }}
  disruption:
  {{- if .Values.karpenter.critical.disruption }}
    {{- .Values.karpenter.critical.disruption | toYaml | nindent 4 }}
  {{- end }}
  {{- if .Values.karpenter.critical.limits }}
  limits:
  {{- .Values.karpenter.critical.limits | toYaml | nindent 4 }}
  {{- end }}
{{- end }}