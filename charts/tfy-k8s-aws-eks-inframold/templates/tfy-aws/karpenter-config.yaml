{{- if .Values.aws.karpenter.config.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-config
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    truefoundry.com/infra-component: "karpenter-config"
  annotations:
    helm.sh/resource-policy: {{ .Values.helm.resourcePolicy }}
spec:
  destination:
    namespace: kube-system
    server: "https://kubernetes.default.svc"
  source:
    chart: tfy-karpenter-config
    repoURL: {{ (.Values.global | default dict).repoURL | default "https://truefoundry.github.io/infra-charts/" }}
    targetRevision: 0.1.57
    helm:
      values: |-
        {{- if .Values.aws.karpenter.config.valuesOverride }}
        {{ .Values.aws.karpenter.config.valuesOverride | toYaml | nindent 8 }}
        {{- else }}
        cluster:
          name: {{ .Values.clusterName }}
        karpenter:
          enabled: {{ .Values.aws.karpenter.enabled }}
          instanceProfile: {{ .Values.aws.karpenter.instanceProfile }}
          defaultNodePool:
            zones: {{- range .Values.aws.karpenter.defaultZones }}
            - {{ . | quote }}
            {{- end }}
          defaultNodeTemplate:
            enableSoci: true
            {{- if .Values.aws.karpenter.kmsKeyID }}
            kmsKeyID: {{ .Values.aws.karpenter.kmsKeyID | default "" }}
            {{- end }}
            {{- if .Values.tags }}
            extraTags:
              {{- range $k, $v := .Values.tags }}
              {{ $k }}: {{ $v | quote }}
              {{- end }}
            {{- end }}
          {{- if .Values.gpu.enabled }}
          gpuNodePool:
            zones: {{- range .Values.aws.karpenter.defaultZones }}
            - {{ . | quote }}
            {{- end }}
          gpuDefaultNodeTemplate:
            enableSoci: true
            {{- if .Values.aws.karpenter.kmsKeyID }}
            kmsKeyID: {{ .Values.aws.karpenter.kmsKeyID | default "" }}
            {{- end }}
            {{- if .Values.tags }}
            extraTags:
              {{- range $k, $v := .Values.tags }}
              {{ $k }}: {{ $v | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          inferentiaNodePool:
            zones: {{- range .Values.aws.karpenter.defaultZones }}
            - {{ . | quote }}
            {{- end }}
          {{- if or .Values.aws.karpenter.kmsKeyID .Values.tags }}
          inferentiaDefaultNodeTemplate:
            {{- if .Values.aws.karpenter.kmsKeyID }}
            kmsKeyID: {{ .Values.aws.karpenter.kmsKeyID | default "" }}
            {{- end }}
            {{- if .Values.tags }}
            extraTags:
              {{- range $k, $v := .Values.tags }}
              {{ $k }}: {{ $v | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          critical:
            zones: {{- range .Values.aws.karpenter.defaultZones }}
            - {{ . | quote }}
            {{- end }}
            {{- if or .Values.aws.karpenter.kmsKeyID .Values.tags }}
            nodeclass:
              {{- if .Values.aws.karpenter.kmsKeyID }}
              kmsKeyID: {{ .Values.aws.karpenter.kmsKeyID | default "" }}
              {{- end }}
              {{- if .Values.tags }}
              extraTags:
                {{- range $k, $v := .Values.tags }}
                {{ $k }}: {{ $v | quote }}
                {{- end }}
              {{- end }}
            {{- end }}
          controlPlaneNodePool:
            zones: {{- range .Values.aws.karpenter.defaultZones }}
            - {{ . | quote }}
            {{- end }}
          {{- if or .Values.aws.karpenter.kmsKeyID .Values.tags }}
          controlPlaneNodeTemplate:
            {{- if .Values.aws.karpenter.kmsKeyID }}
            kmsKeyID: {{ .Values.aws.karpenter.kmsKeyID | default "" }}
            {{- end }}
            {{- if .Values.tags }}
            extraTags:
              {{- range $k, $v := .Values.tags }}
              {{ $k }}: {{ $v | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
  project: tfy-apps
  syncPolicy:
    {{- toYaml .Values.aws.karpenter.config.syncPolicy | nindent 4 }}
{{- end }}
