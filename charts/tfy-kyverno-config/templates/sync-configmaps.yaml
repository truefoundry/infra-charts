{{- if and .Values.syncConfigMaps.enabled .Values.syncConfigMaps.items -}}
{{- if .Values.syncConfigMaps.useClusterPolicy }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ include "tfy-kyverno.fullname" . }}-sync-configmaps
spec:
  rules:
    {{- range $i, $cm := .Values.syncConfigMaps.items }}
    - name: sync-configmap-{{ $cm.name }}
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds:
                - Namespace
              {{- if $.Values.syncConfigMaps.includeNamespaces }}
              names:
                {{- range $.Values.syncConfigMaps.includeNamespaces }}
                - {{ . | quote }}
                {{- end }}
              {{- end }}
      {{- if $.Values.syncConfigMaps.excludeNamespaces }}
      exclude:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                {{- range $.Values.syncConfigMaps.excludeNamespaces }}
                - {{ . | quote }}
                {{- end }}
      {{- end }}
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: v1
        kind: ConfigMap
        name: {{ $cm.name | quote }}
        namespace: "{{`{{request.object.metadata.name}}`}}"
        clone:
          namespace: {{ $cm.namespace | quote }}
          name: {{ $cm.name | quote }}
    {{- end }}
{{- else }}
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: {{ include "tfy-kyverno.fullname" . }}-sync-configmaps
spec:
  evaluation:
    synchronize:
      enabled: true
    generateExisting:
      enabled: true
  matchConstraints:
    {{- if or .Values.syncConfigMaps.excludeNamespaces .Values.syncConfigMaps.includeNamespaces }}
    namespaceSelector:
      matchExpressions:
        {{- if .Values.syncConfigMaps.excludeNamespaces }}
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            {{- range .Values.syncConfigMaps.excludeNamespaces }}
            - {{ . }}
            {{- end }}
        {{- end }}
        {{- if .Values.syncConfigMaps.includeNamespaces }}
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            {{- range .Values.syncConfigMaps.includeNamespaces }}
            - {{ . }}
            {{- end }}
        {{- end }}
    {{- end }}
    resourceRules:
      - apiGroups: ['']
        apiVersions: ['v1']
        operations: ['CREATE']
        resources: ['namespaces']
  variables:
    - name: nsName
      expression: "object.metadata.name"
    {{- range $i, $cm := .Values.syncConfigMaps.items }}
    - name: source{{ $i }}
      expression: >-
        resource.Get("v1", "configmaps", "{{ $cm.namespace }}", "{{ $cm.name }}")
    {{- end }}
  generate:
    - expression: >-
        generator.Apply(variables.nsName, [
        {{- range $i, $cm := .Values.syncConfigMaps.items }}
        {{- if $i }}, {{ end }}variables.source{{ $i }}
        {{- end }}
        ])
{{- end }}
{{- end -}}
