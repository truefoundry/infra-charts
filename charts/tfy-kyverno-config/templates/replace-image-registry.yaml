{{- if .Values.replaceImageRegistry.enabled -}}
{{- $overrides := dict }}
{{- $wildcard := "" }}
{{- range $source, $target := .Values.replaceImageRegistry.registryReplacementMap }}
  {{- if eq $source "*" }}
    {{- $wildcard = $target }}
  {{- else }}
    {{- $_ := set $overrides $source $target }}
    {{- if eq $source "docker.io" }}
      {{- $_ := set $overrides "index.docker.io" $target }}
    {{- else if eq $source "index.docker.io" }}
      {{- $_ := set $overrides "docker.io" $target }}
    {{- end }}
  {{- end }}
{{- end }}
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: {{ include "tfy-kyverno.fullname" . }}-replace-image-registry
  namespace: {{ .Release.Namespace }}
spec:
  matchConstraints:
    {{- if or .Values.replaceImageRegistry.excludeNamespaces .Values.replaceImageRegistry.includeNamespaces }}
    namespaceSelector:
      matchExpressions:
        {{- if .Values.replaceImageRegistry.excludeNamespaces }}
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            {{- range .Values.replaceImageRegistry.excludeNamespaces }}
            - {{ . }}
            {{- end }}
        {{- end }}
        {{- if .Values.replaceImageRegistry.includeNamespaces }}
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            {{- range .Values.replaceImageRegistry.includeNamespaces }}
            - {{ . }}
            {{- end }}
        {{- end }}
    {{- end }}
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              containers: object.spec.containers.map(c,
                Object.spec.containers{
                  name: c.name,
                  image: (
                    {{- range $source, $target := $overrides }}
                    image(c.image).registry() == '{{ $source }}' ? '{{ $target }}/' + image(c.image).repository() + ':' + image(c.image).identifier() :
                    {{- end }}
                    {{- if $wildcard }}
                    c.image.startsWith('{{ $wildcard }}/') ? c.image :
                    '{{ $wildcard }}/' + image(c.image).repository() + ':' + image(c.image).identifier()
                    {{- else }}
                    c.image
                    {{- end }}
                  )
                }
              ),
              initContainers: has(object.spec.initContainers) ?
                object.spec.initContainers.map(c,
                  Object.spec.initContainers{
                    name: c.name,
                    image: (
                      {{- range $source, $target := $overrides }}
                      image(c.image).registry() == '{{ $source }}' ? '{{ $target }}/' + image(c.image).repository() + ':' + image(c.image).identifier() :
                      {{- end }}
                      {{- if $wildcard }}
                      c.image.startsWith('{{ $wildcard }}/') ? c.image :
                      '{{ $wildcard }}/' + image(c.image).repository() + ':' + image(c.image).identifier()
                      {{- else }}
                      c.image
                      {{- end }}
                    )
                  }
                ) : []
            }
          }
  evaluation:
    admission:
      enabled: true
  webhookConfiguration:
    timeoutSeconds: 10
{{- end -}}
