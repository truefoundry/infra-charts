## @section replaceImageRegistry Configuration options for replacing the image registry
replaceImageRegistry:
  ## @param replaceImageRegistry.enabled Enable or disable replacing the image registry
  enabled: false
  ## @param replaceImageRegistry.excludeNamespaces Namespaces to exclude from replacing the image registry
  excludeNamespaces: []

  ## @param replaceImageRegistry.includeNamespaces Namespaces to include from replacing the image registry. When non-empty, only these namespaces will be included
  includeNamespaces: []

  ## @param replaceImageRegistry.registryReplacementMap Map of source registry prefixes to target registries.
  ## Use "*" as wildcard default (strips source registry, keeps image path). Per-source overrides take priority.
  ## Example:
  ##   "*": "registry.organization.com"
  ##   "docker.io": "registry.organization.com/dockerhub-mirror"
  registryReplacementMap: {}

## @section replaceArgoHelmRepo Configuration options for replacing the Argo Helm repository
replaceArgoHelmRepo:
  ## @param replaceArgoHelmRepo.enabled Enable or disable replacing the Argo Helm repository
  enabled: false
  ## @param replaceArgoHelmRepo.excludeNamespaces Namespaces to exclude from replacing the argo helm repo
  excludeNamespaces: []

  ## @param replaceArgoHelmRepo.includeNamespaces Namespaces to include for replacing the argo helm repo. When non-empty, only these namespaces will be included
  includeNamespaces: []

  ## @param replaceArgoHelmRepo.registryReplacementMap Map of source repoURL prefixes to target registries.
  ## Use "*" as wildcard default (strips host, keeps path). Per-source overrides take priority.
  ## Example:
  ##   "*": "registry.organization.com"
  ##   "https://truefoundry.github.io/infra-charts/": "registry.organization.com/helm/infra-charts"
  registryReplacementMap: {}
## @section syncConfigMaps Configuration options for syncing ConfigMaps across namespaces
syncConfigMaps:
  ## @param syncConfigMaps.enabled Enable or disable syncing ConfigMaps across namespaces
  enabled: false
  ## @param syncConfigMaps.useClusterPolicy Use ClusterPolicy (kyverno.io/v1) instead of GeneratingPolicy (policies.kyverno.io/v1). ClusterPolicy has more mature generateExisting support and supports wildcard namespace patterns (e.g. tfy-*)
  useClusterPolicy: true
  ## @param syncConfigMaps.excludeNamespaces Namespaces to exclude from syncing ConfigMaps
  excludeNamespaces: []
  ## @param syncConfigMaps.includeNamespaces Namespaces to include for syncing ConfigMaps. When non-empty, only these namespaces will be included. Supports wildcard patterns (e.g. tfy-*) when useClusterPolicy is true
  ## example
  ## includeNamespaces: [tfy-*]
  includeNamespaces: []

  ## @param syncConfigMaps.items List of ConfigMaps to sync across namespaces
  ## Example:
  ##   - namespace: truefoundry
  ##     name: ca-cert-bundle
  items: []
## @section syncSecrets Configuration options for syncing Secrets across namespaces
## Syncing secrets requires additional RBAC permissions for both the Kyverno admission
## controller and the background controller to read source secrets and create/update/delete generated secrets for synchronization.
## This must be configured in the Kyverno Helm chart values
syncSecrets:
  ## @param syncSecrets.enabled Enable or disable syncing Secrets across namespaces
  enabled: false
  ## @param syncSecrets.useClusterPolicy Use ClusterPolicy (kyverno.io/v1) instead of GeneratingPolicy (policies.kyverno.io/v1). ClusterPolicy has more mature generateExisting support and supports wildcard namespace patterns (e.g. tfy-*)
  useClusterPolicy: true
  ## @param syncSecrets.excludeNamespaces Namespaces to exclude from syncing Secrets
  excludeNamespaces: []
  ## @param syncSecrets.includeNamespaces Namespaces to include for syncing Secrets. When non-empty, only these namespaces will be included. Supports wildcard patterns (e.g. tfy-*) when useClusterPolicy is true
  includeNamespaces: []
  ## @param syncSecrets.items List of Secrets to sync across namespaces
  ## Example:
  ##   - namespace: truefoundry
  ##     name: my-tls-secret
  items: []

## @section podVolumeMounts Configuration options for adding volume mounts to pods
podVolumeMounts:
  ## @param podVolumeMounts.enabled Enable or disable adding volume mounts to pods
  enabled: false
  ## @param podVolumeMounts.useClusterPolicy Use ClusterPolicy (kyverno.io/v1) instead of MutatingPolicy (policies.kyverno.io/v1). ClusterPolicy supports wildcard namespace patterns (e.g. tfy-*), configMap items, env vars, and readOnly volume mounts
  useClusterPolicy: true
  ## @param podVolumeMounts.policyName Name of the ClusterPolicy when useClusterPolicy is true. Defaults to `<release-name>-pod-volume-mounts`
  policyName: "" #Example: custom-ca-cert-policy
  ## @param podVolumeMounts.configMapName Default ConfigMap name for the built-in CA volume mount. Used when mountDetails is not overridden
  configMapName: "" #Example: ca-cert-bundle
  ## @param podVolumeMounts.mountInitContainers Mount volumes into init containers when enabled
  mountInitContainers: false
  ## @param podVolumeMounts.excludeNamespaces Namespaces to exclude from adding volume mounts to pods. Supports wildcard patterns (e.g. tfy-*) when useClusterPolicy is true
  excludeNamespaces: []
  ## @param podVolumeMounts.includeNamespaces Namespaces to include for adding volume mounts to pods. When non-empty, only these namespaces will be included. Supports wildcard patterns (e.g. tfy-*) when useClusterPolicy is true
  ## example
  ## includeNamespaces: [tfy-*]
  includeNamespaces: []
  ## @param podVolumeMounts.objectSelector Label selector to match specific pods. When set, only pods matching these labels will be mutated
  ## Example:
  ##   matchLabels:
  ##     app.kubernetes.io/instance: truefoundry
  ##   matchExpressions:
  ##     - key: app.kubernetes.io/instance
  ##       operator: In
  ##       values: ["truefoundry", "my-app"]
  objectSelector: {}
  ## @param podVolumeMounts.mountDetails Override the chart default volume mounts from files/default-pod-volume-mounts.yaml. When empty, chart defaults are used. Set configMapName on each entry or use podVolumeMounts.configMapName for the built-in default
  mountDetails: []
  ## @param podVolumeMounts.additionalMountDetails Additional volume mounts appended to the effective mount list
  ## Example:
  ##   - type: secret
  ##     secretName: my-secret
  ##     mountPath: /var/run/secrets/my-secret
  additionalMountDetails: []

## @param additionalKyvernoPolicies Additional Kyverno clusterpolicies to apply
additionalKyvernoPolicies: []
