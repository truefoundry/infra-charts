## @section Global parameters for Various Configurations
global:
  ## @param global.imagePullSecrets [array] Existing truefoundry image pull secret name
  imagePullSecrets: []
## @param enabled Deploy NATS UI Deployment and Service
enabled: false
## @param nameOverride Override the component name used in labels and the Deployment name
nameOverride: ""
## @param fullnameOverride If set, overrides the Deployment full name (leave empty for <release>-nats-ui)
fullnameOverride: ""
## @param replicaCount Number of replicas
replicaCount: 1
## @param image.registry Image registry (optional)
image:
  registry: "tfy.jfrog.io"
  ## @param image.repository Container image repository (required when enabled)
  repository: "tfy-private-images/nats-ui-dashboard"
  ## @param image.tag Image tag
  tag: "aae9ff49415bd8f7defc6259a6e21366834db4b4"
## @param imagePullPolicy Image pull policy
imagePullPolicy: IfNotPresent
## @param imagePullSecrets [array] Image pull secrets
imagePullSecrets: []
## @param env [object] If non-empty, replaces natsUrl/accountSeedSecret wiring. Values are passed through tpl(); use ${k8s-secret/<secret>/<key>} or ${k8s-secret/<key>} with envSecretName (same pattern as truefoundry servicefoundryServer.env).
env:
  NATS_URL: "http://{{ .Release.Name }}-tfy-nats:4222"
  NATS_ACCOUNT_SEED: ${k8s-secret/truefoundry-tfy-nats-secret/NATS_CONTROLPLANE_ACCOUNT_SEED}
## @param envSecretName Secret name for shorthand ${k8s-secret/<key>} entries in env
envSecretName: ""
## @param natsUrl Value for NATS_URL when env is empty
natsUrl: ""
## @param accountSeedSecret.name Existing Secret name when env is empty
## @param accountSeedSecret.key Key inside the Secret
accountSeedSecret:
  name: ""
  key: NATS_CONTROLPLANE_ACCOUNT_SEED
## @param service.name Kubernetes Service metadata.name (defaults to nats-ui)
## @param service.type Service type
## @param service.port Service port
## @param service.targetPort Container port (defaults to service.port)
## @param service.annotations [object] Service annotations
service:
  name: nats-ui
  type: ClusterIP
  port: 8080
  targetPort: ""
  annotations: {}
## @param extraEnv [array] Extra environment variables for the container
extraEnv: []
## @param resources [object] Container resources
resources: {}
## @param podSecurityContext [object] Pod security context
podSecurityContext: {}
## @param securityContext [object] Container security context
securityContext: {}
## @param nodeSelector [object] Node selector
nodeSelector: {}
## @param tolerations [array] Tolerations
tolerations: []
## @param affinity [object] Affinity
affinity: {}
