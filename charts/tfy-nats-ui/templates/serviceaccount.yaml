{{- if and .Values.enabled .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tfy-nats-ui.serviceAccountName" . }}
  labels:
    {{- $labels := include "tfy-nats-ui.labels" . | fromYaml }}
    {{- mergeOverwrite $labels (.Values.serviceAccount.labels | default dict) | toYaml | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if hasKey .Values.serviceAccount "automountServiceAccountToken" }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
