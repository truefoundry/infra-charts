{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ default "tfy-nats-ui" .Values.service.name }}
  labels:
    {{- include "tfy-nats-ui.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort | default .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "tfy-nats-ui.selectorLabels" . | nindent 4 }}
{{- end }}
