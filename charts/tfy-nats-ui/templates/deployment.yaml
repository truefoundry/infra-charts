{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tfy-nats-ui.fullname" . }}
  labels:
    {{- include "tfy-nats-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "tfy-nats-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tfy-nats-ui.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tfy-nats-ui.serviceAccountName" . }}
      imagePullSecrets:
        {{- include "tfy-nats-ui.imagePullSecrets" . | nindent 8 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tfy-nats-ui
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "tfy-nats-ui.image" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort | default .Values.service.port }}
              protocol: TCP
          env:
            {{- $envMap := .Values.env | default dict }}
            {{- if gt (len (keys $envMap)) 0 }}
            {{- include "tfy-nats-ui.env" . | trim | nindent 12 }}
            {{- else }}
            - name: NATS_URL
              value: {{ required "natsUrl is required when enabled is true and env is empty" .Values.natsUrl | quote }}
            - name: NATS_ACCOUNT_SEED
              valueFrom:
                secretKeyRef:
                  name: {{ required "accountSeedSecret.name is required when enabled is true and env is empty" .Values.accountSeedSecret.name }}
                  key: {{ .Values.accountSeedSecret.key | default "NATS_CONTROLPLANE_ACCOUNT_SEED" }}
            {{- end }}
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
