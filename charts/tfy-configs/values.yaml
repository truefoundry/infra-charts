## @section Global prameters for Various Configurations
global:
  ## @param global.namespaceOverride Override namespace for the image configurations (defaults to .Release.Namespace)
  namespaceOverride: ""

## @section configs Various Configurations
configs:
  ## @param configs.workbenchImages Workbench images configuration. Please refer to files/workbench-images.yaml for default values and format.
  workbenchImages: "default"
  ## @param configs.imageMutationPolicyOverride Image mutation configuration. Please refer to files/image-mutation-policy.yaml for default values and format.
  imageMutationPolicyOverride: {}
  ## @param configs.k8sManifestValidationPolicyOverride K8s manifest validation policy configuration. Please refer to files/k8s-manifest-validation-policy.yaml for default values and format.
  k8sManifestValidationPolicyOverride: {}
  ## @param configs.cicdTemplates CICD templates configuration. Please refer to files/cicd-templates.yaml for default values and format. key of this map is yaml file name and value is the file contents. You must have a key named `cicd-providers.yaml` in this dictionary
  cicdTemplates: {}
  ## @param configs.chat Chat templates configuration. Please refer to files/chat.yaml for default values and format. key of this map is yaml file name and value is the file contents.
  chat: {}
  ## @param configs.embedding Embedding templates configuration. Please refer to files/embedding.yaml for default values and format. key of this map is yaml file name and value is the file contents.
  embedding: {}
  ## @param configs.image Image templates configuration. Please refer to files/image.yaml for default values and format. key of this map is yaml file name and value is the file contents.
  image: {}
  ## @param configs.realtime Realtime templates configuration. Please refer to files/realtime.yaml for default values and format. key of this map is yaml file name and value is the file contents.
  realtime: {}
  ## @param configs.rerank Rerank templates configuration. Please refer to files/rerank.yaml for default values and format. key of this map is yaml file name and value is the file contents.
  rerank: {}  
  ## @param configs.speech Speech templates configuration. Please refer to files/speech.yaml for default values and format. key of this map is yaml file name and value is the file contents.
  speech: {}
  ## @param configs.transcription Transcription templates configuration. Please refer to files/transcription.yaml for default values and format. key of this map is yaml file name and value is the file contents.
  transcription: {}
  ## @param configs.translation Translation templates configuration. Please refer to files/translation.yaml for default values and format. key of this map is yaml file name and value is the file contents.
  translation: {} 

