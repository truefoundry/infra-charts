## @section Global parameters for Various Configurations
global:
  ## @param global.namespaceOverride Override namespace for the image configurations (defaults to .Release.Namespace)
  namespaceOverride: ""

## @section configs Various Configurations
configs:
  ## @param configs.workbenchImages Workbench images configuration. Please refer to files/workbench-images.yaml for default values and format.
  workbenchImages: "default"
  ## @param configs.imageMutationPolicyOverride Image mutation configuration. Please refer to files/image-mutation-policy.yaml for default values and format.
  imageMutationPolicyOverride: {}
  ## @param configs.k8sManifestValidationPolicyOverride K8s manifest validation policy configuration. Please refer to files/k8s-manifest-validation-policy.yaml for default values and format.
  k8sManifestValidationPolicyOverride: {}
  ## @param configs.cicdTemplates CICD templates configuration. Please refer to files/cicd-templates.yaml for default values and format. key of this map is yaml file name and value is the file contents. You must have a key named `cicd-providers.yaml` in this dictionary
  cicdTemplates: {}
  codeSnippet:
    integrationSets:
      ## @param configs.codeSnippet.integrationSets.enabled Render ConfigMap with index.yaml for LLM gateway code-snippet integration index
      enabled: true
      ## @param configs.codeSnippet.integrationSets.index Full integration index (rendered as index.yaml). Top-level key must be integrationSets.
      index:
        integrationSets:
          chat:
            - templateId: openai
              supported_modes: [stream, non_stream]
            - templateId: langchain
              supported_modes: [stream, non_stream]
            - templateId: node
              supported_modes: [stream, non_stream]
            - templateId: curl
              supported_modes: [stream, non_stream]
            - templateId: python-rest
              supported_modes: [stream, non_stream]
            - templateId: langgraph
              supported_modes: [stream, non_stream]
            - templateId: llamaindex
              supported_modes: [stream, non_stream]
            - templateId: google-adk
              supported_modes: [stream, non_stream]
            - templateId: langchain4j
              supported_modes: [stream, non_stream]
            - templateId: go-openai
              supported_modes: [stream, non_stream]
            - templateId: rust-openai
              supported_modes: [non_stream]
            - templateId: python-litellm
              supported_modes: [stream, non_stream]
            - templateId: pydantic-ai
              supported_modes: [stream, non_stream]
            - templateId: agno
              supported_modes: [stream, non_stream]
            - templateId: crewai
              supported_modes: [stream, non_stream]
            - templateId: instructor
              supported_modes: [stream, non_stream]
            - templateId: langroid
              supported_modes: [stream, non_stream]
            - templateId: openai-agents
              supported_modes: [stream, non_stream]
            - templateId: openai-swarm
              supported_modes: [stream, non_stream]
            - templateId: strands-agents
              supported_modes: [stream, non_stream]
          embedding:
            - templateId: openai
            - templateId: langchain
            - templateId: node
            - templateId: curl
            - templateId: python-rest
            - templateId: langgraph
            - templateId: llamaindex
            - templateId: langchain4j
            - templateId: python-litellm
          rerank:
            - templateId: cohere
            - templateId: langchain
            - templateId: node
            - templateId: curl
            - templateId: python-rest
            - templateId: langgraph
            - templateId: langchain4j
            - templateId: python-litellm
          realtime:
            - templateId: gemini-genai
            - templateId: openai-audio
            - templateId: azure-voicelive
            - templateId: openai
            - templateId: python-rest
            - templateId: node
            - templateId: curl
            - templateId: langgraph
          agent:
            - templateId: openai
            - templateId: langchain
            - templateId: python-stream
            - templateId: node
            - templateId: curl
            - templateId: python-rest
            - templateId: langgraph
          image:
            - templateId: openai
            - templateId: node
            - templateId: curl
            - templateId: python-rest
            - templateId: python-litellm
          mcp:
            - python
            - typescript
            - windsurf
            - vscode
            - cursor
    chat:
      ## @param configs.codeSnippet.chat.enabled Enable chat code snippet templates
      enabled: true
      ## @param configs.codeSnippet.chat.override Override chat templates. key is ejs file name, value is file contents
      override: {}
      ## @param configs.codeSnippet.chat.extraSnippets Extra chat snippets to add. key is ejs file name, value is file contents
      extraSnippets: {}
    embedding:
      ## @param configs.codeSnippet.embedding.enabled Enable embedding code snippet templates
      enabled: true
      ## @param configs.codeSnippet.embedding.override Override embedding templates. key is ejs file name, value is file contents
      override: {}
      ## @param configs.codeSnippet.embedding.extraSnippets Extra embedding snippets to add. key is ejs file name, value is file contents
      extraSnippets: {}
    image:
      ## @param configs.codeSnippet.image.enabled Enable image code snippet templates
      enabled: true
      ## @param configs.codeSnippet.image.override Override image templates. key is ejs file name, value is file contents
      override: {}
      ## @param configs.codeSnippet.image.extraSnippets Extra image snippets to add. key is ejs file name, value is file contents
      extraSnippets: {}
    realtime:
      ## @param configs.codeSnippet.realtime.enabled Enable realtime code snippet templates
      enabled: true
      ## @param configs.codeSnippet.realtime.override Override realtime templates. key is ejs file name, value is file contents
      override: {}
      ## @param configs.codeSnippet.realtime.extraSnippets Extra realtime snippets to add. key is ejs file name, value is file contents
      extraSnippets: {}
    rerank:
      ## @param configs.codeSnippet.rerank.enabled Enable rerank code snippet templates
      enabled: true
      ## @param configs.codeSnippet.rerank.override Override rerank templates. key is ejs file name, value is file contents
      override: {}
      ## @param configs.codeSnippet.rerank.extraSnippets Extra rerank snippets to add. key is ejs file name, value is file contents
      extraSnippets: {}
    speech:
      ## @param configs.codeSnippet.speech.enabled Enable speech code snippet templates
      enabled: true
      ## @param configs.codeSnippet.speech.override Override speech templates. key is ejs file name, value is file contents
      override: {}
      ## @param configs.codeSnippet.speech.extraSnippets Extra speech snippets to add. key is ejs file name, value is file contents
      extraSnippets: {}
    transcription:
      ## @param configs.codeSnippet.transcription.enabled Enable transcription code snippet templates
      enabled: true
      ## @param configs.codeSnippet.transcription.override Override transcription templates. key is ejs file name, value is file contents
      override: {}
      ## @param configs.codeSnippet.transcription.extraSnippets Extra transcription snippets to add. key is ejs file name, value is file contents
      extraSnippets: {}
    translation:
      ## @param configs.codeSnippet.translation.enabled Enable translation code snippet templates
      enabled: true
      ## @param configs.codeSnippet.translation.override Override translation templates. key is ejs file name, value is file contents
      override: {}
      ## @param configs.codeSnippet.translation.extraSnippets Extra translation snippets to add. key is ejs file name, value is file contents
      extraSnippets: {}
