## @section Global parameters for Various Configurations
global:
  ## @param global.namespaceOverride Override namespace for the image configurations (defaults to .Release.Namespace)
  namespaceOverride: ""

## @section configs Various Configurations
configs:
  ## @param configs.workbenchImages Workbench images configuration. Please refer to files/workbench-images.yaml for default values and format.
  workbenchImages: "default"
  ## @param configs.imageMutationPolicyOverride Image mutation configuration. Please refer to files/image-mutation-policy.yaml for default values and format.
  imageMutationPolicyOverride: {}
  ## @param configs.k8sManifestValidationPolicyOverride K8s manifest validation policy configuration. Please refer to files/k8s-manifest-validation-policy.yaml for default values and format.
  k8sManifestValidationPolicyOverride: {}
  ## @param configs.cicdTemplates CICD templates configuration. Please refer to files/cicd-templates.yaml for default values and format. key of this map is yaml file name and value is the file contents. You must have a key named `cicd-providers.yaml` in this dictionary
  cicdTemplates: {}
  codeSnippet:
    ## @param configs.codeSnippet.chat Chat templates configuration. Please refer to files/llm-gateway-codesnippet/chat/*.ejs for default values and format.
    chat:
      enabled: true
      override: {}
      extraSnippets: {}
    ## @param configs.codeSnippet.embedding Embedding templates configuration. Please refer to files/llm-gateway-codesnippet/embedding/*.ejs for default values and format.
    embedding:
      enabled: true
      override: {}
      extraSnippets: {}
    ## @param configs.codeSnippet.image Image templates configuration. Please refer to files/llm-gateway-codesnippet/image/*.ejs for default values and format.
    image:
      enabled: true
      override: {}
      extraSnippets: {}
    ## @param configs.codeSnippet.realtime Realtime templates configuration. Please refer to files/llm-gateway-codesnippet/realtime/*.ejs for default values and format.
    realtime:
      enabled: true
      override: {}
      extraSnippets: {}
    ## @param configs.codeSnippet.rerank Rerank templates configuration. Please refer to files/llm-gateway-codesnippet/rerank/*.ejs for default values and format.
    rerank:
      enabled: true
      override: {}
      extraSnippets: {}
    ## @param configs.codeSnippet.speech Speech templates configuration. Please refer to files/llm-gateway-codesnippet/speech/*.ejs for default values and format.
    speech:
      enabled: true
      override: {}
      extraSnippets: {}
    ## @param configs.codeSnippet.transcription Transcription templates configuration. Please refer to files/llm-gateway-codesnippet/transcription/*.ejs for default values and format.
    transcription:
      enabled: true
      override: {}
      extraSnippets: {}
    ## @param configs.codeSnippet.translation Translation templates configuration. Please refer to files/llm-gateway-codesnippet/translation/*.ejs for default values and format.
    translation:
      enabled: true
      override: {}
      extraSnippets: {}
