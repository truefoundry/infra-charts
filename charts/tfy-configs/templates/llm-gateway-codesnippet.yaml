apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-chat-cm
  namespace: {{ include "global.namespace" . }}
data:
{{- if .Values.configs.codeSnippet.chat }}
  {{- range $key, $value := .Values.configs.codeSnippet.chat }}
  {{ $key }}: |
{{ $value | indent 4 }}
  {{- end }}
{{- else }}
{{ (.Files.Glob "files/chat/*.ejs").AsConfig | indent 2 }}
{{- end }}


