apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tfy-sandbox-server.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "tfy-sandbox-server.deploymentLabels" . | nindent 4 }}
  annotations:
    {{- include "tfy-sandbox-server.deploymentAnnotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tfy-sandbox-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "tfy-sandbox-server.podAnnotations" . | nindent 8 }}
      labels:
        {{- include "tfy-sandbox-server.podLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tfy-sandbox-server.serviceAccountName" . }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- $initContainers := include "tfy-sandbox-server.customCA.initContainer" . | trim }}
      {{- if $initContainers }}
      initContainers:
        {{- $initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: sandbox-server
          image: {{ include "tfy-sandbox-server.image" . | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: SANDBOXES_ROOT_DIR
              value: {{ .Values.sandbox.rootDir | quote }}
            - name: PORT
              value: "8080"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: sandbox-data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.global.customCA.enabled }}
            {{- include "tfy-sandbox-server.customCA.volumeMounts" . | nindent 12 }}
            {{- end }}
      imagePullSecrets:
        {{- include "tfy-sandbox-server.imagePullSecrets" . | nindent 8 }}
      volumes:
        - name: sandbox-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "tfy-sandbox-server.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.global.customCA.enabled }}
        {{- include "tfy-sandbox-server.customCA.volumes" . | nindent 8 }}
        {{- end }}
      nodeSelector:
        {{- include "tfy-sandbox-server.nodeSelector" . | nindent 8 }}
      affinity:
        {{- include "tfy-sandbox-server.affinity" . | nindent 8 }}
      tolerations:
        {{- include "tfy-sandbox-server.tolerations" . | nindent 8 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
