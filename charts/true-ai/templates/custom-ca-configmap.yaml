{{- if and .Values.global.customCA.enabled .Values.global.customCA.certificate (not .Values.global.customCA.existingConfigMap.name) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "true-ai.fullname" . }}-custom-ca
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "true-ai.commonLabels" . | nindent 4 }}
data:
  ca-certificates.crt: |
    {{- .Values.global.customCA.certificate | nindent 4 }}
{{- end }}
