{{- if .Values.ingress.enabled -}}
{{- $serviceName := include "true-ai.fullname" . -}}
{{- $servicePort := .Values.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "true-ai.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "true-ai.ingressLabels" . | nindent 4 }}
  annotations:
    {{- include "true-ai.ingressAnnotations" . | nindent 4 }}
spec:
  ingressClassName: {{ tpl .Values.ingress.ingressClassName $ }}
  rules:
    {{- range $host := .Values.ingress.hosts }}
    - host: {{ tpl $host $ }}
      http:
        paths:
        - path: {{ $.Values.ingress.path | default "/" }}
          pathType: {{ $.Values.ingress.pathType | default "Prefix" }}
          backend:
            service:
              name: {{ $serviceName }}
              port:
                number: {{ $servicePort }}
    {{- end -}}
  {{- if .Values.ingress.tls }}
  tls:
  {{-  tpl (.Values.ingress.tls | toYaml) $ | nindent 4 }}
  {{- end -}}
{{- end -}}
