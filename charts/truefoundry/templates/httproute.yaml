{{- $tfyProxyServiceName := index (splitList "." (tpl (.Values.global.proxy.tfyProxyHost) .)) 0 -}}
{{- $tfyWorkflowAdminServiceName := index (splitList "." (tpl (.Values.global.proxy.tfyWorkflowAdminHost) .)) 0 -}}
{{- if .Values.global.httpRoute.enabled -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "truefoundry.httproute.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "truefoundry.httproute.labels" . | nindent 4 }}
  annotations:
    {{- include "truefoundry.httproute.annotations" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.global.httpRoute.parentRefs | nindent 4 }}
  {{- if .Values.global.httpRoute.hostnames }}
  hostnames:
    {{- range $hostname := .Values.global.httpRoute.hostnames }}
    - {{ tpl $hostname $ | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if $.Values.tfyWorkflowAdmin.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /flyteidl.service.AdminService/
      backendRefs:
        - name: {{ $tfyWorkflowAdminServiceName }}
          port: {{ $.Values.tfyWorkflowAdmin.service.port }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $tfyProxyServiceName }}
          port: {{ $.Values.tfyProxy.service.port }}
{{- end }}
