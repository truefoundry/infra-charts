{{- if and .Values.global.wif.enabled (or .Values.tags.llmGatewayRequestLogging .Values.tags.tracing) .Values.deltaFusionIngestor.enabled -}}
{{- if and .Values.deltaFusionIngestor.serviceAccount.create .Values.deltaFusionIngestor.serviceAccount.name }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "deltafusion-ingestor.fullname" . }}-wif
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "deltafusion-ingestor.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "deltafusion-ingestor.commonAnnotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "truefoundry.fullname" . }}-wif
subjects:
  - kind: ServiceAccount
    name: {{ include "deltafusion-ingestor.serviceAccountName" . }}
    namespace: {{ include "global.namespace" . }}
{{- end }}
{{- if and .Values.deltaFusionCompaction.enabled .Values.deltaFusionCompaction.serviceAccount.create .Values.deltaFusionCompaction.serviceAccount.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "deltafusion-compaction.fullname" . }}-wif
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "deltafusion-compaction.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "deltafusion-compaction.commonAnnotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "truefoundry.fullname" . }}-wif
subjects:
  - kind: ServiceAccount
    name: {{ include "deltafusion-compaction.serviceAccountName" . }}
    namespace: {{ include "global.namespace" . }}
{{- end }}
{{- end }}
