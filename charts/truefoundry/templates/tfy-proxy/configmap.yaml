{{- if and .Values.tfyProxy.enabled (not .Values.tfyProxy.existingProxyConfigMapName) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tfy-proxy.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "tfy-proxy.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "tfy-proxy.commonAnnotations" . | nindent 4 }}
data:
  {{- if .Values.tfyProxy.proxyConfigOverride }}
  Caddyfile: |
    {{ .Values.tfyProxy.proxyConfigOverride | nindent 4 }}
  {{- else }}
  Caddyfile: |
    {
      log {
        level {{ .Values.tfyProxy.logLevel }}
        output stdout
      }
      
      {{- if .Values.global.proxy.tls.enabled }}
      auto_https off
      {{- else }}
      auto_https disable_redirects
      {{- end }}

      servers {
        protocols h1 h2 h2c

        timeouts {
          write 0
          idle 0
          read_header 0
          read_body 0
        }
        max_header_size 0
      }

      {{- if .Values.tfyProxy.adminApi.enabled }}
      metrics {
        per_host
      }
      {{- end }}
    }

    {{- if .Values.global.proxy.cors.enabled }}
    (cors) {
      @cors_preflight method OPTIONS
      handle @cors_preflight {
        {{- if .Values.global.proxy.cors.allowedOrigins }}
        {{- $regexParts := list }}
        {{- range .Values.global.proxy.cors.allowedOrigins }}
        {{- $origin := . }}
        {{- if eq $origin "*" }}
          {{- $regexParts = append $regexParts ".*" }}
        {{- else if contains "://" $origin }}
          {{- $escaped := $origin | replace "." "\\\\." | replace "*\\\\." ".*\\\\." }}
          {{- $regexParts = append $regexParts $escaped }}
        {{- else }}
          {{- $escaped := $origin | replace "." "\\\\." | replace "*\\\\." ".*\\\\." }}
          {{- $regexParts = append $regexParts (printf "https?://%s" $escaped) }}
        {{- end }}
        {{- end }}
        {{- $regex := $regexParts | join "|" }}
        @origin_allowed {
          expression {http.request.header.Origin}.matches("^({{ $regex }})$")
        }
        @origin_pna_cors {
          expression {http.request.header.Origin}.matches("^({{ $regex }})$")
          header Access-Control-Request-Private-Network true
        }
        header @origin_allowed Access-Control-Allow-Origin "{http.request.header.Origin}"
        header @origin_allowed Access-Control-Allow-Credentials "true"
        header @origin_pna_cors Access-Control-Allow-Private-Network "true"
        {{- else }}
        @pna_requested_cors header Access-Control-Request-Private-Network true
        header Access-Control-Allow-Origin "{http.request.header.Origin}"
        header Access-Control-Allow-Credentials "true"
        header @pna_requested_cors Access-Control-Allow-Private-Network "true"
        {{- end }}
        header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, Origin"
        header Access-Control-Max-Age "3600"
        respond "" 204
      }

      {{- if .Values.global.proxy.cors.allowedOrigins }}
      {{- $regexParts := list }}
      {{- range .Values.global.proxy.cors.allowedOrigins }}
      {{- $origin := . }}
      {{- if eq $origin "*" }}
        {{- $regexParts = append $regexParts ".*" }}
      {{- else if contains "://" $origin }}
        {{- $escaped := $origin | replace "." "\\\\." | replace "*\\\\." ".*\\\\." }}
        {{- $regexParts = append $regexParts $escaped }}
      {{- else }}
        {{- $escaped := $origin | replace "." "\\\\." | replace "*\\\\." ".*\\\\." }}
        {{- $regexParts = append $regexParts (printf "https?://%s" $escaped) }}
      {{- end }}
      {{- end }}
      {{- $regex := $regexParts | join "|" }}
      @origin {
        expression {http.request.header.Origin}.matches("^({{ $regex }})$")
      }
      @origin_pna {
        expression {http.request.header.Origin}.matches("^({{ $regex }})$")
        header Access-Control-Request-Private-Network true
      }
      header @origin >Access-Control-Allow-Origin "{http.request.header.Origin}"
      header @origin >Access-Control-Allow-Credentials "true"
      header @origin_pna >Access-Control-Allow-Private-Network "true"
      header @origin >Vary "Origin"

      @not_origin {
        expression {http.request.header.Origin} != "" && !{http.request.header.Origin}.matches("^({{ $regex }})$")
      }
      header @not_origin -Access-Control-Allow-Origin
      header @not_origin -Access-Control-Allow-Credentials
      header @not_origin -Access-Control-Allow-Private-Network

      @no_origin {
        expression {http.request.header.Origin} == ""
      }
      header @no_origin -Access-Control-Allow-Origin

      {{- else }}
      @pna_requested header Access-Control-Request-Private-Network true
      header >Access-Control-Allow-Origin "{http.request.header.Origin}"
      header >Access-Control-Allow-Credentials "true"
      header @pna_requested >Access-Control-Allow-Private-Network "true"
      header >Vary "Origin"
      {{- end }}
    }
    {{- end }}

    {{- if .Values.global.proxy.enforceSecurityHeaders }}
    (security_headers) {
        header {
            # Enable HSTS to force HTTPS
            Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

            # Prevent MIME type sniffing
            X-Content-Type-Options "nosniff"

            # Prevent clickjacking (alternative: use CSP frame-ancestors)
            X-Frame-Options "SAMEORIGIN"

            # Content Security Policy
            Content-Security-Policy "{{ .Values.global.proxy.contentSecurityPolicy }}"

            # Control referrer information sending
            Referrer-Policy "strict-origin-when-cross-origin"

            # Remove headers
            -Server
            -X-Powered-By
            -Via
        }
    }
    {{- end }}

    {{- if .Values.tfyProxy.adminApi.enabled }}
    :2019 {
      handle /metrics {
        metrics /metrics
      }
    }
    {{- end }}

    :8080 {
      {{- if .Values.global.proxy.tls.enabled }}
      tls /etc/caddy/tls/tls.crt /etc/caddy/tls/tls.key
      {{- end }}

      {{- if .Values.global.proxy.enforceSecurityHeaders }}
      import security_headers

      {{- end }}
      # Serve static files
      encode zstd gzip
      root * /usr/share/caddy

      {{- if .Values.global.proxy.cors.enabled }}
      import cors
      {{- end }}

      handle /health {
        respond "OK!" 200
      }

      # /api/svc/socket.io → /socket.io on upstream:3000
      handle /api/svc/socket.io* {
        uri strip_prefix /api/svc
        rewrite * /socket.io{path}
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }

      {{- if .Values.tfyProxy.useMcpV2 }}
      # Legacy MCP OAuth callback reroutes to new endpoints
      # /api/svc/v1/llm-gateway/mcp-servers/oauth2/callback → /mcp/oauth2/callback/outbound (outbound OAuth)
      handle /api/svc/v1/llm-gateway/mcp-servers/oauth2/callback {
        uri replace /api/svc/v1/llm-gateway/mcp-servers/oauth2/callback /mcp/oauth2/callback/outbound
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }

      # /api/svc/oauth2-mcp/callback → /mcp/oauth2/callback/inbound (inbound OAuth)
      handle /api/svc/oauth2-mcp/callback {
        uri replace /api/svc/oauth2-mcp/callback /mcp/oauth2/callback/inbound
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }
      {{- end }}

      # /mcp → /v1/tfy-mcp on upstream:3000
      handle /mcp {
        rewrite * /v1/tfy-mcp
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }

      # /api/svc → / on upstream:3000
      handle /api/svc/* {
        uri strip_prefix /api/svc
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }

      {{- if .Values.stdioMcpProxy.enabled }}
      # /api/stdio-mcp-proxy → / on upstream:8000
      handle /api/stdio-mcp-proxy/* {
        uri strip_prefix /api/stdio-mcp-proxy
        reverse_proxy {{ tpl .Values.global.proxy.stdioMcpProxyHost . }}:{{ .Values.stdioMcpProxy.service.port }}
      }
      {{- end }}

      handle /api/env {
        uri strip_prefix /api/env
        rewrite * /v1/fe-env
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }

      {{- if .Values.global.proxy.llmGateway.external }}
      handle /.well-known/oauth-protected-resource/api/llm/* {
        uri replace /.well-known/oauth-protected-resource/api/llm /.well-known/oauth-protected-resource
        reverse_proxy {{ tpl .Values.global.proxy.llmGateway.backendURL . }} {
          header_up Host {{ (tpl .Values.global.proxy.llmGateway.backendURL .) | trimPrefix "https://" | trimPrefix "http://" }}
          header_up x-tfy-llm-gateway-uri "{http.request.host}/api/llm"
        }
      }
      {{- else }}
      handle /.well-known/oauth-protected-resource/api/llm/* {
        uri replace /.well-known/oauth-protected-resource/api/llm /.well-known/oauth-protected-resource
        reverse_proxy {{ tpl .Values.global.proxy.llmGateway.backendHost . }}:{{ .Values.global.proxy.llmGateway.backendPort }} {
          header_up x-tfy-llm-gateway-uri "{http.request.host}/api/llm"
        }
      }
      {{- end }}

      # RFC 8414 well-known discovery (prepended form) -> server's path-appended form on upstream:3000
      # /.well-known/openid-configuration/api/svc/<rest> -> /<rest>/.well-known/openid-configuration
      handle /.well-known/openid-configuration/api/svc/* {
        uri replace /.well-known/openid-configuration/api/svc ""
        rewrite {path}/.well-known/openid-configuration
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }

      # /.well-known/oauth-authorization-server/api/svc/<rest> -> /<rest>/.well-known/oauth-authorization-server
      handle /.well-known/oauth-authorization-server/api/svc/* {
        uri replace /.well-known/oauth-authorization-server/api/svc ""
        rewrite {path}/.well-known/oauth-authorization-server
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }

      handle /api/auth/* {
        uri strip_prefix /api/auth
        reverse_proxy {{ tpl .Values.global.proxy.authServerURL . }} {
          header_up Host {{ (tpl .Values.global.proxy.authServerURL .) | trimPrefix "https://" | trimPrefix "http://" }}
        }
      }

      {{- if .Values.global.proxy.trtEngineBuilderBaseURL }}
      handle /api/trt-engine-builder/* {
        uri strip_prefix /api/trt-engine-builder
        reverse_proxy {{ tpl .Values.global.proxy.trtEngineBuilderBaseURL . }} {
          header_up Host {{ (tpl .Values.global.proxy.trtEngineBuilderBaseURL .) | trimPrefix "https://" | trimPrefix "http://" }}
        }
      }
      {{- end }}

      {{- if .Values.global.proxy.trueAI.enabled }}
      # /true-ai and /true-ai/* → / on upstream:8080
      handle /true-ai /true-ai/* {
        uri strip_prefix /true-ai
        reverse_proxy {{ tpl .Values.global.proxy.trueAI.host . }}:{{ .Values.global.proxy.trueAI.port }}
      }
      {{- end }}

      {{- if .Values.global.proxy.liveDemoTokenVendorURL }}
      handle /api/live-demo-token-vendor/* {
        uri strip_prefix /api/live-demo-token-vendor
        reverse_proxy {{ tpl .Values.global.proxy.liveDemoTokenVendorURL . }} {
            header_up Host {{ (tpl .Values.global.proxy.liveDemoTokenVendorURL .) | trimPrefix "https://" | trimPrefix "http://" }}
        }
      }
      {{- end }}

      {{- if .Values.global.proxy.managedClusterOnboardingServiceURL }}
      handle /api/managed-cluster-onboarding/* {
        uri strip_prefix /api/managed-cluster-onboarding
        reverse_proxy {{ tpl .Values.global.proxy.managedClusterOnboardingServiceURL . }} {
            header_up Host {{ (tpl .Values.global.proxy.managedClusterOnboardingServiceURL .) | trimPrefix "https://" | trimPrefix "http://" }}
        }
      }
      {{- end }}

      {{- if .Values.global.proxy.mlfToSvcEnabled }}
      # /api/ml: whitelist → servicefoundry; default → mlfoundry (kill switch: global.proxy.mlfToSvcEnabled)
      # mlfoundry-only legacy paths (not on svc) — must precede @ml_to_svc blanket mlfoundry-artifacts/*
      @ml_on_mlf {
        path /api/ml/api/2.0/mlflow/mlfoundry-artifacts/model-versions/export-deployment-files-by-fqn
      }
      handle @ml_on_mlf {
        uri strip_prefix /api/ml
        reverse_proxy {{ tpl .Values.global.proxy.mlfoundryHost . }}:{{ .Values.mlfoundryServer.service.port }}
      }

      @ml_to_svc {
        path /api/ml/v1/ml-repos /api/ml/v1/ml-repos/*
        path /api/ml/v1/artifacts /api/ml/v1/artifacts/*
        path /api/ml/v1/artifact-versions /api/ml/v1/artifact-versions/*
        path /api/ml/v1/models /api/ml/v1/models/*
        path /api/ml/v1/model-versions /api/ml/v1/model-versions/*
        path /api/ml/v1/agent-skills /api/ml/v1/agent-skills/*
        path /api/ml/v1/agent-skill-versions /api/ml/v1/agent-skill-versions/*
        path /api/ml/v1/prompts /api/ml/v1/prompts/*
        path /api/ml/v1/prompt-versions /api/ml/v1/prompt-versions/*
        path /api/ml/v1/data-directories /api/ml/v1/data-directories/*
        path /api/ml/v1/x/artifact-versions /api/ml/v1/x/artifact-versions/*
        path /api/ml/v1/x/deleted-entities /api/ml/v1/x/deleted-entities/*
        path /api/ml/v1/x/delete-entity /api/ml/v1/x/delete-entity/*
        path /api/ml/v1/x/prompts/count /api/ml/v1/x/prompts/count/*
        path /api/ml/v1/x/prompt-versions /api/ml/v1/x/prompt-versions/*
        path /api/ml/v1/x/prompt-versions/validate /api/ml/v1/x/prompt-versions/validate/*
        path /api/ml/v1/x/agent-skill-versions/bulk-get /api/ml/v1/x/agent-skill-versions/bulk-get/*
        path /api/ml/v1/x/agent-skill-versions/presigned-urls /api/ml/v1/x/agent-skill-versions/presigned-urls/*
        path /api/ml/api/2.0/mlflow/runs /api/ml/api/2.0/mlflow/runs/*
        path /api/ml/api/2.0/mlflow/metrics /api/ml/api/2.0/mlflow/metrics/*
        path /api/ml/api/2.0/mlflow/mlfoundry-artifacts /api/ml/api/2.0/mlflow/mlfoundry-artifacts/*
        path /api/ml/api/2.0/mlflow/experiments/hard-delete
        path /api/ml/api/2.0/mlflow/experiments/columns
        path /api/ml/api/2.0/preview/mlflow/runs/search
        path /api/ml/api/2.0mlflow/runs/get-by-name
      }
      handle @ml_to_svc {
        uri strip_prefix /api/ml
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }

      handle /api/ml/* {
        uri strip_prefix /api/ml
        reverse_proxy {{ tpl .Values.global.proxy.mlfoundryHost . }}:{{ .Values.mlfoundryServer.service.port }}
      }
      {{- else }}
      # /api/ml -> / on upstream:5000 (kill switch off: global.proxy.mlfToSvcEnabled=false)
      handle /api/ml/* {
        uri strip_prefix /api/ml
        reverse_proxy {{ tpl .Values.global.proxy.mlfoundryHost . }}:{{ .Values.mlfoundryServer.service.port }}
      }
      {{- end }}

      {{- if .Values.global.proxy.tfyLLMAgentURL }}
      # /api/agent → / on upstream:8080
      handle /api/agent/* {
        uri strip_prefix /api/agent
        reverse_proxy {{ tpl .Values.global.proxy.tfyLLMAgentURL . }} {
          header_up Host {{ (tpl .Values.global.proxy.tfyLLMAgentURL .) | trimPrefix "https://" | trimPrefix "http://" }}
        }
      }
      {{- end }}

      {{- if .Values.global.proxy.llmGateway.external }}
      # /api/llm/ → / on upstream:8787
      handle /api/llm/* {
        uri strip_prefix /api/llm
        reverse_proxy {{ tpl .Values.global.proxy.llmGateway.backendURL . }} {
          header_up Host {{ (tpl .Values.global.proxy.llmGateway.backendURL .) | trimPrefix "https://" | trimPrefix "http://" }}
          header_up x-tfy-llm-gateway-uri "{http.request.host}/api/llm"
        }
      }
      {{- else }}
      # /api/llm/ → / on upstream:8787
      handle /api/llm/* {
        uri strip_prefix /api/llm
        reverse_proxy {{ tpl .Values.global.proxy.llmGateway.backendHost . }}:{{ .Values.global.proxy.llmGateway.backendPort }} {
          header_up x-tfy-llm-gateway-uri "{http.request.host}/api/llm"
        }
      }
      {{- end }}

      {{- if .Values.tfyController.enabled }}
      # /api/proxy-server/socket.io → /socket.io on upstream:8123
      handle /api/proxy-server/socket.io* {
        uri strip_prefix /api/proxy-server
        rewrite * /socket.io{path}
        reverse_proxy {{ tpl .Values.global.proxy.proxyServerHost . }}:{{ .Values.tfyController.service.port }}
      }

      # /api/proxy-server/ → / on upstream:8123
      handle /api/proxy-server/* {
        uri strip_prefix /api/proxy-server
        reverse_proxy {{ tpl .Values.global.proxy.proxyServerHost . }}:{{ .Values.tfyController.service.port }}
      }
      {{- end }}

      {{- if .Values.s3proxy.enabled }}
      # /api/s3proxy/ → / on upstream:8080
      handle /api/s3proxy/* {
        uri strip_prefix /api/s3proxy
        reverse_proxy {{ tpl .Values.global.proxy.s3proxyHost . }}:{{ .Values.s3proxy.service.port }}
      }
      {{- end }}

      {{- if (or .Values.tags.llmGatewayRequestLogging .Values.tags.tracing) }}
      # /api/otel/ → / on upstream:4318
      handle /api/otel/* {
        uri strip_prefix /api/otel
        reverse_proxy {{ tpl .Values.global.proxy.tfyOtelCollector.host . }}:{{ .Values.global.proxy.tfyOtelCollector.port }}
      }
      {{- end }}

      {{- if and .Values.truefoundryMonitoring.enabled .Values.truefoundryMonitoring.grafana.enabled }}
      # /admin/grafana/* → /api/grafana/proxy/* on upstream:3000
      handle /admin/grafana/* {
        uri replace /admin/grafana /api/grafana/proxy
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }
      {{- end }}

      {{- if and .Values.truefoundryMonitoring.enabled .Values.truefoundryMonitoring.tfyNatsUi.enabled }}
      # /admin/nats/* → /api/nats/proxy/* on upstream:3000
      handle /admin/nats/* {
        uri replace /admin/nats /api/nats/proxy
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }
      {{- end }}

      {{- if and .Values.truefoundryMonitoring.enabled .Values.truefoundryMonitoring.tfyMetricsDashboard.enabled }}
      # /admin/metrics-dashboard/* → /api/metrics-dashboard/proxy/* on upstream:3000
      handle /admin/metrics-dashboard/* {
        uri replace /admin/metrics-dashboard /api/metrics-dashboard/proxy
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }
      {{- end }}

      {{- if and .Values.truefoundryMonitoring.enabled .Values.truefoundryMonitoring.headlamp.enabled }}
      # /admin/kubernetes/* → /api/kubernetes/proxy/* on upstream:3000
      handle /admin/kubernetes/* {
        uri replace /admin/kubernetes /api/kubernetes/proxy
        reverse_proxy {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }}
      }
      {{- end }}

      {{- if .Values.tfyInfraManager.enabled }}
      # /admin/infra-manager and /admin/infra-manager/* → / on upstream:8080 (IM serves SPA + API at root
      @infra_manager path /admin/infra-manager /admin/infra-manager/*
      handle @infra_manager {
        forward_auth {{ tpl .Values.global.proxy.servicefoundryServerHost . }}:{{ .Values.servicefoundryServer.service.port }} {
          uri /auth/forward-auth/tenant-admin
          copy_headers X-Forwarded-User X-Forwarded-Email X-Tenant-Name
        }
        uri strip_prefix /admin/infra-manager
        reverse_proxy {{ tpl .Values.global.proxy.tfyInfraManagerHost . }}:{{ .Values.tfyInfraManager.service.port }}
      }
      {{- end }}

      # NATS WS direct path
      handle /nats-websocket/* {
        reverse_proxy {{ tpl .Values.global.proxy.tfyNats.host . }}:{{ .Values.global.proxy.tfyNats.port }}
      }

      # Catch-all: WS first, then assets, then SPA
      handle /* {
        @websocket {
          header_regexp Connection (?i).*upgrade.*
          header Upgrade websocket
        }

        reverse_proxy @websocket {{ tpl .Values.global.proxy.tfyNats.host . }}:{{ .Values.global.proxy.tfyNats.port }}

        @assets {
          path /assets/*
        }

        handle @assets {
          try_files {path} {path}/
          file_server
        }

        try_files {path} /index.html
        file_server
      }
    }
  {{- end }}
{{- end -}}
