{{- if .Values.global.wif.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "truefoundry.fullname" . }}-wif
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "global.labels" . | nindent 4 }}
  annotations:
    {{- include "global.annotations" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    verbs:
      - create
{{- if .Values.global.serviceAccount.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "truefoundry.fullname" . }}-wif
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "global.labels" . | nindent 4 }}
  annotations:
    {{- include "global.annotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "truefoundry.fullname" . }}-wif
subjects:
  - kind: ServiceAccount
    name: {{ .Values.global.serviceAccount.name }}
    namespace: {{ include "global.namespace" . }}
{{- end }}
{{- end }}
