{{- if and .Values.global.wif.enabled .Values.mlfoundryServer.enabled .Values.mlfoundryServer.serviceAccount.create .Values.mlfoundryServer.serviceAccount.name -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mlfoundry-server.fullname" . }}-wif
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "mlfoundry-server.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "mlfoundry-server.commonAnnotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "truefoundry.fullname" . }}-wif
subjects:
  - kind: ServiceAccount
    name: {{ include "mlfoundry-server.serviceAccountName" . }}
    namespace: {{ include "global.namespace" . }}
{{- end }}
