{{- if and .Values.servicefoundryServer.rbac.enabled .Values.servicefoundryServer.enabled .Values.tfyBuild.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "servicefoundry-server.fullname" . }}-role
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "servicefoundry-server.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "servicefoundry-server.commonAnnotations" . | nindent 4 }}
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflows
    verbs:
      - create
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
{{- end}}
{{- if and .Values.global.wif.enabled .Values.servicefoundryServer.enabled .Values.servicefoundryServer.serviceAccount.create .Values.servicefoundryServer.serviceAccount.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "servicefoundry-server.fullname" . }}-wif
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "servicefoundry-server.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "servicefoundry-server.commonAnnotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "truefoundry.fullname" . }}-wif
subjects:
  - kind: ServiceAccount
    name: {{ include "servicefoundry-server.serviceAccountName" . }}
    namespace: {{ include "global.namespace" . }}
{{- end }}
