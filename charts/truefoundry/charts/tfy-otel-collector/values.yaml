## @section Configuration values for tfy-otel-collector

## Global Config
global:
  ## @param global.resourceTier [string] Resource deployment type
  resourceTier: "medium"
  ## @param global.affinity [object] Affinity rules for pod scheduling on a node
  affinity: {}
  ## @param global.annotations [object] Global annotations
  annotations: {}
  ## @param global.labels [object] Global labels
  labels: {}
  ## @param global.tolerations [array] Tolerations for pod scheduling on a node
  tolerations: []
  ## @param global.imagePullSecrets [array] Existing truefoundry image pull secret name
  imagePullSecrets: []
  ## @param global.nodeSelector [object] Node selector
  nodeSelector: {}
  ## global.serviceAccount Service account configuration
  serviceAccount:
    ## @param global.serviceAccount.name Service account name
    name: "truefoundry"
    ## @param global.serviceAccount.annotations Service account annotations
    annotations: {}
    ## @param global.serviceAccount.labels Service account labels
    labels: {}
  ## @param global.podAnnotations [object] Pod annotations
  podAnnotations: {}
  ## @param global.podLabels [object] Pod labels
  podLabels: {}
  ## @param global.serviceLabels [object] Service labels
  serviceLabels: {}
  ## @param global.deploymentLabels [object] Deployment labels
  deploymentLabels: {}
  ## @param global.deploymentAnnotations [object] Deployment annotations
  deploymentAnnotations: {}
  ## @param global.serviceAnnotations [object] Service annotations
  serviceAnnotations: {}
  ## @param global.image.registry Image registry for tfyOtelCollector (defaults to global.image.registry if not set)
  image:
    registry: "tfy.jfrog.io"
  ## @param global.namespaceOverride Namespace override (defaults to .Release.Namespace if not set)
  namespaceOverride: ""
  ## global.podSecurityContext Pod security context defaults for all components (each overrides per field; `enabled: false` disables everywhere). Overridden by the parent chart's `global.podSecurityContext` when installed under truefoundry.
  podSecurityContext:
    ## @param global.podSecurityContext.enabled Toggle pod security contexts for all components; a component can override with its own `enabled`.
    enabled: true
  ## global.containerSecurityContext Container security context defaults for all components (each overrides per field; `enabled: false` disables everywhere). Overridden by the parent chart's `global.containerSecurityContext` when installed under truefoundry.
  containerSecurityContext:
    ## @param global.containerSecurityContext.enabled Toggle container security contexts for all components; a component can override with its own `enabled`.
    enabled: true
  ## global.customCA Custom CA certificate configuration
  customCA:
    ## @param global.customCA.enabled Bool to enable custom CA certificate injection
    enabled: false
    ## @param global.customCA.certificate PEM-encoded CA certificate to trust (paste the full certificate content here). Uses an initContainer to merge with system CAs.
    certificate: ""
    ## global.customCA.existingConfigMap Reference an existing ConfigMap containing CA certificate(s) under key "ca-certificates.crt"
    existingConfigMap:
      ## @param global.customCA.existingConfigMap.name Name of the existing ConfigMap
      name: ""
      ## @param global.customCA.existingConfigMap.overrideCAList When true, mounts ConfigMap directly at /etc/ssl/certs/ replacing the system CA bundle (no initContainer). The ConfigMap must contain the full CA bundle (system + custom CAs). When false, an initContainer merges the custom CA with system CAs.
      overrideCAList: false
    ## @param global.customCA.env [object] Additional environment variables to inject into the custom CA initContainer when customCA is enabled.
    env: {}
    # Example:
    # env:
    #   SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    #   REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
    ## global.customCA.emptyDir EmptyDir configuration for volumes used in custom CA injection
    emptyDir:
      sslCerts:
        ## @param global.customCA.emptyDir.sslCerts.sizeLimit Size limit for the ssl-certs emptyDir volume
        sizeLimit: ""
    ## @param global.customCA.securityContext [object] Security context for the custom CA initContainer.
    securityContext:
      ## Enable/disable this to override the global.containerSecurityContext
      # enabled: true
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    ## global.customCA.image Image configuration for the initContainer that processes CA certificates (not used when overrideCAList is true)
    image:
      ## @param global.customCA.image.registry Registry override for the CA certificates initContainer image (defaults to global.image.registry)
      registry: ""
      ## @param global.customCA.image.repository Repository for the CA certificates initContainer image
      repository: "tfy-mirror/alpine"
      ## @param global.customCA.image.tag Tag for the CA certificates initContainer image
      tag: "3.21"

## @param env [object] Environment variables for the tfyOtelCollector
env:
  TFY_API_KEY: ${k8s-secret/truefoundry-creds/TFY_API_KEY}
  SENTRY_AUTH_SERVER_URL: https://auth.truefoundry.com
  TENANT_NAME: "{{ .Values.global.tenantName }}"
  SENTRY_ENABLED: "{{ .Values.global.enableSentry }}"
  DELTAFUSION_INGESTOR_BASE_URL: http://{{ .Release.Name }}-deltafusion-ingestor:8000
  SFY_SERVER_BASE_URL: http://{{ .Release.Name }}-servicefoundry-server:3000
  SFY_SERVER_REQUEST_TIMEOUT: 30s
  DELTAFUSION_INGESTOR_REQUEST_TIMEOUT: 60s
  DELTAFUSION_INGESTOR_REQUEST_RETRY_INTERVAL: 10s
  DELTAFUSION_INGESTOR_REQUEST_MAX_RETRIES: "2"
  SFY_SERVER_REQUEST_MAX_RETRIES: "2"
  SFY_SERVER_REQUEST_RETRY_INTERVAL: 10s
  TFY_OTEL_EXPORTER_BATCH_WINDOW: 2s
  TFY_OTEL_EXPORTER_BATCH_SIZE: "50"
  TFY_OTEL_EXPORTER_QUEUE_SIZE: "100"
  TFY_OTEL_EXPORTER_REQUEST_TIMEOUT: 60s
  TFY_OTEL_EXPORTER_REQUEST_MAX_RETRIES: "3"
  TFY_OTEL_EXPORTER_REQUEST_RETRY_INTERVAL: 1s
  TFY_OTEL_EXPORTER_TICKER_INTERVAL: 1s
  TFY_OTEL_EXPORTER_TIMEOUT: 60s

## Image configuration for otel-collector
image:
  ## @param image.registry Image registry for tfyOTELCollector (defaults to global.image.registry if not set)
  registry: ""
  ## @param image.repository Image repository for tfyOTELCollector
  repository: tfy-private-images/tfy-otel-collector
  ## @param image.tag Image tag for the tfyOTELCollector
  tag: v0.158.0

## @param imagePullSecrets [array] List of secrets to pull images
imagePullSecrets: []

## @param fullnameOverride Full name override for the tfy-otel-collector
fullnameOverride: ""

## @skip replicaCount Number of replicas
# replicaCount: 2

## @param environmentName The environment name
environmentName: default
## @param envSecretName The environment secret name
envSecretName: ""
## @param imagePullPolicy Image pull policy
imagePullPolicy: IfNotPresent
## @param nameOverride Name override
nameOverride: ""
## @param podAnnotations Pod annotations
podAnnotations: {}
## @param commonAnnotations Common annotations
commonAnnotations: {}
## @param podSecurityContext [object] Pod security context
podSecurityContext:
  ## Enable/disable this to override the global.podSecurityContext
  # enabled: true
  runAsNonRoot: true
  runAsUser: 1001
## @param commonLabels [object] Common labels
commonLabels: {}
## @param podLabels [object] Pod annotations
podLabels: {}
## @param deploymentAnnotations [object] Deployment annotations
deploymentAnnotations: {}
## @param deploymentLabels [object] Deployment labels
deploymentLabels: {}
## @param securityContext [object] Security context configuration
securityContext:
  ## Enable/disable this to override the global.containerSecurityContext
  # enabled: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
## Healthcheck configuration
healthcheck:
  ## @param healthcheck.enabled Enable healthcheck
  enabled: true
  ## healthcheck.readiness Readiness probe configuration
  readiness:
    ## @param healthcheck.readiness.port Port to probe
    port: 3000
    ## @param healthcheck.readiness.path Path to probe
    path: /health/status
    ## @param healthcheck.readiness.initialDelaySeconds Initial delay in seconds
    initialDelaySeconds: 30
    ## @param healthcheck.readiness.periodSeconds Period in seconds
    periodSeconds: 10
    ## @param healthcheck.readiness.timeoutSeconds Timeout in seconds
    timeoutSeconds: 1
    ## @param healthcheck.readiness.successThreshold Success threshold
    successThreshold: 1
    ## @param healthcheck.readiness.failureThreshold Failure threshold
    failureThreshold: 3
  ## healthcheck.liveness Liveness probe configuration
  liveness:
    ## @param healthcheck.liveness.port Port to probe
    port: 3000
    ## @param healthcheck.liveness.path Path to probe
    path: /health/status
    ## @param healthcheck.liveness.initialDelaySeconds Initial delay in seconds
    initialDelaySeconds: 600
    ## @param healthcheck.liveness.periodSeconds Period in seconds
    periodSeconds: 10
    ## @param healthcheck.liveness.timeoutSeconds Timeout in seconds
    timeoutSeconds: 1
    ## @param healthcheck.liveness.successThreshold Success threshold
    successThreshold: 1
    ## @param healthcheck.liveness.failureThreshold Failure threshold
    failureThreshold: 3
