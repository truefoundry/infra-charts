apiVersion: v2
name: truefoundry
version: 0.158.3
description: "TrueFoundry Control Plane Components"
maintainers:
  - name: truefoundry
dependencies:
  - condition: tfyNats.enabled
    name: nats
    alias: tfyNats
    repository: https://nats-io.github.io/k8s/helm/charts/
    version: 2.12.6
  - condition: devMode.enabled
    name: postgresql
    repository: oci://tfy.jfrog.io/tfy-mirror/bitnamicharts
    version: 18.1.1
  - name: tfy-manifests-template
    repository: https://truefoundry.github.io/infra-charts/
    version: 0.2.0
    alias: extraResources
    condition: extraResources.enabled
  - name: tfy-llm-gateway
    repository: oci://tfy.jfrog.io/tfy-helm
    version: 0.158.1
    condition: tfy-llm-gateway.enabled
    tags:
      - llmGateway
  - name: tfy-otel-collector
    repository: file://charts/tfy-otel-collector
    version: 0.158.1
    condition: tfy-otel-collector.enabled
    tags:
      - tracing
      - llmGatewayRequestLogging
  - name: tfy-victoria-metrics-config
    repository: https://truefoundry.github.io/infra-charts/
    version: 0.1.3
    alias: victoriaMetricsMonitoring
    condition: victoriaMetricsMonitoring.enabled
  - name: truefoundry-monitoring
    repository: https://truefoundry.github.io/infra-charts/
    version: 0.1.6
    alias: truefoundryMonitoring
    condition: truefoundryMonitoring.enabled
