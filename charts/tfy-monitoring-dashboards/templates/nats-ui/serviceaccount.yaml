{{- if and .Values.tfyNatsUi.enabled .Values.tfyNatsUi.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tfy-monitoring-dashboards.nats-ui.serviceAccountName" . }}
  labels:
    {{- $labels := include "tfy-monitoring-dashboards.nats-ui.labels" . | fromYaml }}
    {{- mergeOverwrite $labels (.Values.tfyNatsUi.serviceAccount.labels | default dict) | toYaml | nindent 4 }}
  {{- with .Values.tfyNatsUi.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if hasKey .Values.tfyNatsUi.serviceAccount "automountServiceAccountToken" }}
automountServiceAccountToken: {{ .Values.tfyNatsUi.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
