{{- if and .Values.tfyMetricsDashboard.enabled .Values.tfyMetricsDashboard.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tfy-monitoring-dashboards.metrics-dashboard.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels := include "tfy-monitoring-dashboards.metrics-dashboard.labels" . | fromYaml }}
    {{- mergeOverwrite $labels (.Values.tfyMetricsDashboard.serviceAccount.labels | default dict) | toYaml | nindent 4 }}
  {{- with .Values.tfyMetricsDashboard.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if hasKey .Values.tfyMetricsDashboard.serviceAccount "automountServiceAccountToken" }}
automountServiceAccountToken: {{ .Values.tfyMetricsDashboard.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
