{{- if .Values.tfyMetricsDashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tfy-monitoring-dashboards.metrics-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tfy-monitoring-dashboards.metrics-dashboard.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.tfyMetricsDashboard.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "tfy-monitoring-dashboards.metrics-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tfy-monitoring-dashboards.metrics-dashboard.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tfy-monitoring-dashboards.metrics-dashboard.serviceAccountName" . }}
      {{- with .Values.tfyMetricsDashboard.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tfy-metrics-dashboard
          image: {{ include "tfy-monitoring-dashboards.metrics-dashboard.image" . | quote }}
          imagePullPolicy: {{ .Values.tfyMetricsDashboard.imagePullPolicy }}
          {{- with .Values.tfyMetricsDashboard.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.tfyMetricsDashboard.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- include "tfy-monitoring-dashboards.metrics-dashboard.resources" . | nindent 12 }}
      {{- with .Values.tfyMetricsDashboard.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tfyMetricsDashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tfyMetricsDashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tfyMetricsDashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
