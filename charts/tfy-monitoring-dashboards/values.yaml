## =============================================================================
## @section Headlamp configuration
## Headlamp is deployed as a subchart. RBAC is managed by this chart.
## =============================================================================
headlamp:
  ## @param headlamp.enabled Deploy Headlamp
  enabled: false
  ## @param headlamp.clusterRoleBinding.create Keep false — prevents headlamp subchart from creating a cluster-admin ClusterRoleBinding. Read-only RBAC is always created by this chart when headlamp.enabled=true.
  clusterRoleBinding:
    create: false
  config:
    ## @param headlamp.config.pluginsDir Directory for Headlamp plugins
    pluginsDir: "/headlamp/plugins"
  persistentVolumeClaim:
    ## @param headlamp.persistentVolumeClaim.enabled Enable PVC for plugin storage
    enabled: false
  ## @param headlamp.service.port Service port for Headlamp
  service:
    port: 4466
  ## Projected volume that injects the service account token so Headlamp auto-authenticates without a login screen.
  ## @skip headlamp.volumeMounts
  volumeMounts:
    - name: sa-token
      mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      readOnly: true
  ## @skip headlamp.volumes
  volumes:
    - name: sa-token
      projected:
        sources:
          - serviceAccountToken:
              path: token
              expirationSeconds: 3607
          - configMap:
              name: kube-root-ca.crt
              items:
                - key: ca.crt
                  path: ca.crt
