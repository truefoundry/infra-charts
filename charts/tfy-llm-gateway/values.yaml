  port: 8787
  ## @param service.annotations Service annotations
  annotations: {}
  ## @param service.labels Service labels
  labels: {}
## Proxy configuration (tfy-proxy / Caddy).
## When `proxy.tls.enabled` is true, the proxy terminates TLS on
## `proxy.containerPort` (default 8081) using the cert in `proxy.tls.secretName`,
## and reverse-proxies to the gateway on loopback. The ClusterIP service.port
## (default 8787) forwards to that proxy port; the gateway container itself
## stays plaintext and listens on service.port.
##
## IMPORTANT — Ingress wiring (when ingress.enabled is true):
## TLS is terminated INSIDE the pod, so your ingress controller must forward
## the encrypted connection without terminating it. The chart does NOT add the
## controller-specific annotation for you; set it under `ingress.annotations`.
## For ingress-nginx, that means:
##     ingress:
##       annotations:
##         nginx.ingress.kubernetes.io/ssl-passthrough: "true"
## (The ingress-nginx controller must also be started with
##  `--enable-ssl-passthrough`, which is off by default.)
## For Istio, configure passthrough on the Gateway resource
## (`tls.mode: PASSTHROUGH`); for ALB / Traefik / others, follow their docs.
proxy:
  ## @param proxy.name Proxy container name
  name: proxy
  ## @param proxy.containerPort TCP port the proxy listens on for TLS (must differ from service.port; Service targetPort when proxy TLS is enabled)
  containerPort: 8081
  ## @param proxy.configMapName Override Caddyfile ConfigMap name (default: fullname + "-caddyfile")
  configMapName: ""
  ## @param proxy.imagePullPolicy Image pull policy for the proxy container. Empty string inherits the top-level `imagePullPolicy`.
  imagePullPolicy: ""
  ## proxy.image Image for the proxy container.
  image:
    ## @param proxy.image.registry Registry override for the proxy image (defaults to image.registry, then global.image.registry)
    registry: ""
    ## @param proxy.image.repository Repository for the proxy image
    repository: tfy-private-images/tfy-proxy
    ## @param proxy.image.tag Tag for the proxy image (defaults to the gateway image.tag when empty)
    tag: ""
  ## @param proxy.resources [object] Resource requests/limits for the proxy container
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  ## @param proxy.securityContext [object] Security context for the proxy container (mirrors the main container's defaults)
  securityContext:
    ## Enable/disable this to override the global.containerSecurityContext
    # enabled: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  ## proxy.healthcheck Probes target the TLS listener (proxy.containerPort) via tcpSocket.
  healthcheck:
    ## @param proxy.healthcheck.enabled Enable readiness/liveness probes for the proxy
    enabled: true
    ## proxy.healthcheck.readiness Readiness probe configuration
    readiness:
      ## @param proxy.healthcheck.readiness.port TCP port the readiness probe checks. Empty string falls back to proxy.containerPort.
      port: ""
      ## @param proxy.healthcheck.readiness.initialDelaySeconds Initial delay in seconds
      initialDelaySeconds: 5
      ## @param proxy.healthcheck.readiness.periodSeconds Period in seconds
      periodSeconds: 10
      ## @param proxy.healthcheck.readiness.timeoutSeconds Timeout in seconds
      timeoutSeconds: 1
      ## @param proxy.healthcheck.readiness.successThreshold Success threshold
      successThreshold: 1
      ## @param proxy.healthcheck.readiness.failureThreshold Failure threshold
      failureThreshold: 3
    ## proxy.healthcheck.liveness Liveness probe configuration
    liveness:
      ## @param proxy.healthcheck.liveness.port TCP port the liveness probe checks. Empty string falls back to proxy.containerPort.
      port: ""
      ## @param proxy.healthcheck.liveness.initialDelaySeconds Initial delay in seconds
      initialDelaySeconds: 15
      ## @param proxy.healthcheck.liveness.periodSeconds Period in seconds
      periodSeconds: 20
      ## @param proxy.healthcheck.liveness.timeoutSeconds Timeout in seconds
      timeoutSeconds: 1
      ## @param proxy.healthcheck.liveness.successThreshold Success threshold
      successThreshold: 1
      ## @param proxy.healthcheck.liveness.failureThreshold Failure threshold
      failureThreshold: 3
  ## proxy.tls TLS configuration for the proxy (in-pod termination).
  tls:
    ## @param proxy.tls.enabled Enable TLS termination via the proxy
    enabled: false
    ## @param proxy.tls.secretName Secret containing tls.crt and tls.key for the proxy (required when proxy.tls.enabled is true)
    secretName: ""
