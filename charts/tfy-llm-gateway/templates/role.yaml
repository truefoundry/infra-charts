{{- if and .Values.global.wif.enabled .Values.serviceAccount.create .Values.serviceAccount.name -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tfy-llm-gateway.fullname" . }}-wif
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "tfy-llm-gateway.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "tfy-llm-gateway.commonAnnotations" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tfy-llm-gateway.fullname" . }}-wif
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "tfy-llm-gateway.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "tfy-llm-gateway.commonAnnotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tfy-llm-gateway.fullname" . }}-wif
subjects:
  - kind: ServiceAccount
    name: {{ include "tfy-llm-gateway.serviceAccountName" . }}
    namespace: {{ include "global.namespace" . }}
{{- end }}
