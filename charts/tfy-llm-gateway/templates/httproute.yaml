{{- if .Values.httpRoute.enabled -}}
{{- $serviceName := include "tfy-llm-gateway.fullname" . -}}
{{- $servicePort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "tfy-llm-gateway.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "tfy-llm-gateway.httpRouteLabels" . | nindent 4 }}
  annotations:
    {{- include "tfy-llm-gateway.httpRouteAnnotations" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- if .Values.httpRoute.hostnames }}
  hostnames:
    {{- range $hostname := .Values.httpRoute.hostnames }}
    - {{ tpl $hostname $ | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $serviceName }}
          port: {{ $servicePort }}
{{- end }}
