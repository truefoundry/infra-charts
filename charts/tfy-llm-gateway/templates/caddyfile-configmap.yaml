{{- if .Values.proxy.tls.enabled }}
{{- include "tfy-llm-gateway.proxy.validate" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tfy-llm-gateway.proxy.configMapName" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "tfy-llm-gateway.commonLabels" . | nindent 4 }}
  annotations:
    {{- include "tfy-llm-gateway.commonAnnotations" . | nindent 4 }}
data:
  Caddyfile: |
    {
      admin off
      auto_https off
      log {
        level info
        output stdout
      }
    }

    :{{ .Values.proxy.containerPort }} {
      tls /etc/caddy/tls/tls.crt /etc/caddy/tls/tls.key

      reverse_proxy 127.0.0.1:{{ .Values.service.port }} {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
      }
    }
{{- end }}
