## @section gpu parameters
## @param gpu.enabled Flag to enable Tfy GPU Operator
##
gpu:
  enabled: true

  ## @param gpu.syncPolicy [object] ArgoCD syncPolicy for the tfy-gpu-operator Application
  ##
  syncPolicy:
    managedNamespaceMetadata:
      annotations:
        truefoundry.com/allowed-ingress-namespaces: "prometheus"
    automated:
      prune: true
      selfHeal: false
    retry:
      limit: 5
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
