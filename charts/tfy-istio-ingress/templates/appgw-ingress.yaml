{{- if .Values.appgw.ingress.enabled }}
{{- $hasWildcard := false }}
{{- range .Values.appgw.ingress.domains }}
{{- if eq .host "*" }}
{{- $hasWildcard = true }}
{{- end }}
{{- end }}
{{- $tlsEntries := list }}
{{- $wildcardSecretName := "" }}
{{- if $hasWildcard }}
{{- range .Values.appgw.ingress.domains }}
{{- if and (eq .host "*") .secretName }}
{{- $wildcardSecretName = .secretName }}
{{- end }}
{{- end }}
{{- else }}
{{- range .Values.appgw.ingress.domains }}
{{- if .secretName }}
{{- $tlsEntries = append $tlsEntries . }}
{{- end }}
{{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-appgw-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    appgw.ingress.kubernetes.io/backend-protocol: http
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
    appgw.ingress.kubernetes.io/cookie-based-affinity: "true"
    appgw.ingress.kubernetes.io/health-probe-interval: "30"
    appgw.ingress.kubernetes.io/health-probe-path: /healthz/ready
    appgw.ingress.kubernetes.io/health-probe-port: "15021"
    appgw.ingress.kubernetes.io/health-probe-status-codes: 200-399
    appgw.ingress.kubernetes.io/health-probe-timeout: "30"
    appgw.ingress.kubernetes.io/health-probe-unhealthy-threshold: "3"
    appgw.ingress.kubernetes.io/request-timeout: "300"
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
    appgw.ingress.kubernetes.io/use-private-ip: "false"
    {{- range $key, $value := .Values.appgw.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.appgw.ingress.ingressClassName }}
  rules:
  {{- if $hasWildcard }}
  - host: "*"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}
            port:
              number: 80
  {{- else }}
  {{- range .Values.appgw.ingress.domains }}
  - host: {{ .host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $.Release.Name }}
            port:
              number: 80
  {{- end }}
  {{- end }}
  {{- if $hasWildcard }}
  {{- if $wildcardSecretName }}
  tls:
  - hosts:
    - "*"
    secretName: {{ $wildcardSecretName }}
  {{- end }}
  {{- else if $tlsEntries }}
  tls:
  {{- range $tlsEntries }}
  - hosts:
    - {{ .host }}
    secretName: {{ .secretName }}
  {{- end }}
  {{- end }}
{{- if .Values.appgw.ingress.flyte.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-appgw-flyte-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    appgw.ingress.kubernetes.io/backend-protocol: http
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
    appgw.ingress.kubernetes.io/cookie-based-affinity: "true"
    appgw.ingress.kubernetes.io/health-probe-interval: "30"
    appgw.ingress.kubernetes.io/health-probe-path: /healthz/ready
    appgw.ingress.kubernetes.io/health-probe-port: "15021"
    appgw.ingress.kubernetes.io/health-probe-status-codes: 200-399
    appgw.ingress.kubernetes.io/health-probe-timeout: "30"
    appgw.ingress.kubernetes.io/health-probe-unhealthy-threshold: "3"
    appgw.ingress.kubernetes.io/request-timeout: "300"
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
    appgw.ingress.kubernetes.io/use-private-ip: "false"
    {{- range $key, $value := .Values.appgw.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.appgw.ingress.ingressClassName }}
  rules:
  {{- if $hasWildcard }}
  - host: "*"
    http:
      paths:
      - path: /flyteidl.service.AdminService
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}
            port:
              number: 80
      {{- range .Values.appgw.ingress.additionalHttp2Paths }}
      - path: {{ .path }}
        pathType: {{ .pathType }}
        backend:
          service:
            name: {{ .serviceName | default $.Release.Name }}
            port:
              number: {{ .servicePort | default 80 }}
      {{- end }}
  {{- else }}
  {{- range .Values.appgw.ingress.domains }}
  - host: {{ .host }}
    http:
      paths:
      - path: /flyteidl.service.AdminService
        pathType: Prefix
        backend:
          service:
            name: {{ $.Release.Name }}
            port:
              number: 80
      {{- range $.Values.appgw.ingress.additionalHttp2Paths }}
      - path: {{ .path }}
        pathType: {{ .pathType }}
        backend:
          service:
            name: {{ .serviceName | default $.Release.Name }}
            port:
              number: {{ .servicePort | default 80 }}
      {{- end }}
  {{- end }}
  {{- end }}
  {{- if $hasWildcard }}
  {{- if $wildcardSecretName }}
  tls:
  - hosts:
    - "*"
    secretName: {{ $wildcardSecretName }}
  {{- end }}
  {{- else if $tlsEntries }}
  tls:
  {{- range $tlsEntries }}
  - hosts:
    - {{ .host }}
    secretName: {{ .secretName }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
