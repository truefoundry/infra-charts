{{- if .Values.gpu.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tfy-gpu-operator
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    truefoundry.com/infra-component: "tfy-gpu-operator"
  annotations:
    helm.sh/resource-policy: {{ .Values.helm.resourcePolicy }}
spec:
  destination:
    namespace: tfy-gpu-operator
    server: https://kubernetes.default.svc
  project: tfy-apps
  source:
    repoURL: {{ (.Values.global | default dict).repoURL | default "https://truefoundry.github.io/infra-charts/" }}
    chart: tfy-gpu-operator
    targetRevision: 0.4.7
    helm:
      values: |-
        {{- if .Values.gpu.valuesOverride }}
        {{ .Values.gpu.valuesOverride | toYaml | nindent 8 }}
        {{- else }}
        clusterType:
          {{.Values.gpu.clusterType}}: true
        {{- end }}
  syncPolicy:
    {{- toYaml .Values.gpu.syncPolicy | nindent 4 }}
{{- end }}
