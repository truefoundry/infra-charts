{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tfy-metrics-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tfy-metrics-dashboard.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "tfy-metrics-dashboard.selectorLabels" . | nindent 4 }}
{{- end }}
