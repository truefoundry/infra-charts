## @param enabled Deploy Metrics Dashboard Deployment and Service
enabled: true
## @param nameOverride Override the component name used in labels and the Deployment name
nameOverride: ""
## @param fullnameOverride If set, overrides the Deployment full name (leave empty for <release>-tfy-metrics-dashboard)
fullnameOverride: ""
## @param replicaCount Number of replicas
replicaCount: 1
## @param image.registry Image registry
image:
  registry: "ghcr.io"
  ## @param image.repository Container image repository (path within registry)
  repository: "truefoundry/tfy-metrics-dashboard"
  ## @param image.tag Image tag
  tag: "78049faac40e566f3d7014a39a310593254c69c8"
## @param imagePullPolicy Image pull policy
imagePullPolicy: IfNotPresent
## @param serviceAccount.create Create a dedicated ServiceAccount
serviceAccount:
  create: false
  ## @param serviceAccount.name Override ServiceAccount name (defaults to fullname when create is true; when create is false defaults to the cluster default unless set)
  name: ""
  ## @param serviceAccount.annotations [object] Service account annotations
  annotations: {}
  ## @param serviceAccount.labels [object] Extra labels for the ServiceAccount
  labels: {}
  ## @param serviceAccount.automountServiceAccountToken Automount service account token into the pod (only used when create is true)
  automountServiceAccountToken: false
## @param imagePullSecrets [array] Image pull secrets
imagePullSecrets: []
## @param podSecurityContext [object] Pod-level security context
podSecurityContext: {}
## @param securityContext [object] Container-level security context
securityContext: {}
## @param service.type Kubernetes Service type
service:
  type: ClusterIP
  ## @param service.port Kubernetes Service port
  port: 80
## @param resources [object] CPU/Memory resource requests/limits
resources: {}
## @param nodeSelector [object] Node labels for pod assignment
nodeSelector: {}
## @param tolerations [array] Tolerations for pod assignment
tolerations: []
## @param affinity [object] Affinity for pod assignment
affinity: {}
