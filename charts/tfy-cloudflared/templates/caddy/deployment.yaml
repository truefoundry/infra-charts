{{- if .Values.caddy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tfy-cloudflared.caddyFullname" . }}
  labels:
    {{- include "tfy-cloudflared.caddyCommonLabels" . | nindent 4 }}
  annotations:
    {{- include "tfy-cloudflared.commonAnnotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.caddy.replicaCount }}
  selector:
    matchLabels:
      {{- include "tfy-cloudflared.caddySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tfy-cloudflared.caddySelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tfy-cloudflared.caddyServiceAccountName" . }}
      containers:
        - name: caddy
          image: {{ include "tfy-cloudflared.caddyImage" . | quote }}
          imagePullPolicy: {{ .Values.caddy.image.pullPolicy }}
          args:
            - caddy
            - run
            - --config
            - /etc/caddy/Caddyfile
            - --adapter
            - caddyfile
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: admin
              containerPort: 2019
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.caddy.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "tfy-cloudflared.caddyFullname" . }}-config
      {{- with .Values.caddy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.caddy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.caddy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
